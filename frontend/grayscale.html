<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Grayscale PDF – Convertulo</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
  <style>/* same CSS block */</style>
</head>
<body>
<div class="container">
  <div class="card">
    <div class="card-header"><i class="fas fa-adjust"></i><h1>Grayscale PDF</h1></div>
    <div class="drop-zone" id="dropZone"><div class="drop-icon"><i class="fas fa-file-pdf"></i></div><div class="drop-text">Drop PDF</div></div>
    <input type="file" id="fileInput" accept="application/pdf" hidden>
    <div id="fileInfo"></div>
    <button id="grayscaleBtn" class="btn-primary">Convert to Grayscale</button>
    <div style="text-align: center;"><a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to all tools</a></div>
  </div>
</div>
<script>
  let grayFile = null;
  const dropZone = document.getElementById('dropZone'), fileInput = document.getElementById('fileInput'), fileInfo = document.getElementById('fileInfo'), grayscaleBtn = document.getElementById('grayscaleBtn');
  async function convertToGrayscale(file) {
    const arrayBuffer = await file.arrayBuffer();
    const pdfData = new Uint8Array(arrayBuffer);
    const loadingTask = pdfjsLib.getDocument({ data: pdfData });
    const pdfDoc = await loadingTask.promise;
    const newPdf = await PDFLib.PDFDocument.create();
    for(let i=1; i<=pdfDoc.numPages; i++) {
      const page = await pdfDoc.getPage(i);
      const viewport = page.getViewport({ scale: 1.5 });
      const canvas = document.createElement('canvas');
      canvas.width = viewport.width; canvas.height = viewport.height;
      const ctx = canvas.getContext('2d');
      await page.render({ canvasContext: ctx, viewport }).promise;
      // Convert to grayscale
      const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const data = imageData.data;
      for(let j=0; j<data.length; j+=4) {
        const gray = data[j] * 0.299 + data[j+1] * 0.587 + data[j+2] * 0.114;
        data[j] = data[j+1] = data[j+2] = gray;
      }
      ctx.putImageData(imageData, 0, 0);
      const jpegBlob = await new Promise(resolve => canvas.toBlob(resolve, 'image/jpeg', 0.9));
      const jpegBytes = await jpegBlob.arrayBuffer();
      const image = await newPdf.embedJpg(jpegBytes);
      const pdfPage = newPdf.addPage([canvas.width, canvas.height]);
      pdfPage.drawImage(image, { x:0, y:0, width:canvas.width, height:canvas.height });
    }
    return await newPdf.save();
  }
  function setFile(file) { grayFile = file; fileInfo.innerHTML = file ? `<i class="fas fa-file-pdf"></i> ${escapeHtml(file.name)} (${formatBytes(file.size)})` : ''; }
  function handleDrop(files) { let f = Array.from(files).find(f => f.type === 'application/pdf'); if(f) { setFile(f); showToast(`Ready to convert to grayscale`); } else showToast('PDF required', true); }
  dropZone.addEventListener('click', () => fileInput.click());
  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
  dropZone.addEventListener('drop', e => { e.preventDefault(); dropZone.classList.remove('drag-over'); handleDrop(e.dataTransfer.files); });
  fileInput.addEventListener('change', e => { handleDrop(e.target.files); fileInput.value = ''; });
  grayscaleBtn.addEventListener('click', async () => {
    if(!grayFile) { showToast('Select a PDF', true); return; }
    grayscaleBtn.disabled = true; const orig = grayscaleBtn.innerHTML; grayscaleBtn.innerHTML = '<span class="spinner"></span> Converting...';
    try {
      const grayBytes = await convertToGrayscale(grayFile);
      saveAs(new Blob([grayBytes], { type: 'application/pdf' }), `grayscale_${grayFile.name}`);
      showToast(`✅ Converted to grayscale`);
    } catch(e) { showToast('Grayscale error: ' + e.message, true); }
    finally { grayscaleBtn.disabled = false; grayscaleBtn.innerHTML = orig; }
  });
</script>
</body>
</html>
