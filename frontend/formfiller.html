<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PDF Form Filler - PDFAir | Fill PDF Forms Online</title>
  <meta name="description" content="Fill out PDF forms digitally. Add text, checkboxes, signatures to any PDF form. Save filled forms instantly.">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #050b14; color: #eef2ff; padding: 2rem 1rem; }
    #particleCanvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2; pointer-events: none; }
    .gradient-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at 20% 30%, rgba(74,144,226,0.08), transparent 60%), radial-gradient(circle at 80% 70%, rgba(255,107,107,0.08), transparent 60%); z-index: -1; pointer-events: none; }
    .container { max-width: 1000px; margin: 0 auto; position: relative; z-index: 2; }
    .top-bar { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem; margin-bottom: 2rem; padding: 0.8rem 1.5rem; background: rgba(10,20,35,0.4); backdrop-filter: blur(20px); border-radius: 3rem; border: 1px solid rgba(255,255,255,0.08); }
    .logo { display: flex; align-items: center; gap: 0.8rem; text-decoration: none; }
    .logo h1 { font-size: 1.5rem; background: linear-gradient(135deg, #4A90E2, #FF6B6B, #FFB347); background-clip: text; -webkit-background-clip: text; color: transparent; font-weight: 700; }
    .back-link { color: #4A90E2; text-decoration: none; }
    .card { background: rgba(15,25,45,0.5); backdrop-filter: blur(16px); border-radius: 2rem; padding: 2rem; border: 1px solid rgba(255,255,255,0.1); margin-bottom: 2rem; }
    .card-header { display: flex; align-items: center; gap: 1rem; margin-bottom: 1.5rem; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 1rem; }
    .card-header i { font-size: 2rem; background: linear-gradient(145deg, #4A90E2, #FF6B6B); background-clip: text; -webkit-background-clip: text; color: transparent; }
    .card-header h2 { font-size: 1.5rem; font-weight: 600; }
    .drop-zone { background: rgba(0,0,0,0.3); border: 2px dashed rgba(74,144,226,0.5); border-radius: 1.5rem; padding: 2rem; text-align: center; cursor: pointer; transition: 0.2s; margin-bottom: 1rem; }
    .drop-zone.drag-over { border-color: #FF6B6B; background: rgba(255,107,107,0.1); }
    .btn { padding: 0.8rem 1.5rem; border-radius: 2rem; border: none; font-weight: 600; cursor: pointer; transition: all 0.2s; display: inline-flex; align-items: center; gap: 0.5rem; }
    .btn-primary { background: linear-gradient(135deg, #4A90E2, #FF6B6B); color: white; }
    .btn-secondary { background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.2); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .file-info { background: rgba(255,255,255,0.05); border-radius: 1rem; padding: 0.5rem; margin: 1rem 0; text-align: center; }
    .form-fields { margin-top: 1.5rem; display: none; }
    .form-field { background: rgba(0,0,0,0.3); border-radius: 1rem; padding: 1rem; margin-bottom: 1rem; }
    .form-field label { display: block; margin-bottom: 0.5rem; color: #FFB347; font-weight: 500; }
    .form-field input, .form-field textarea { width: 100%; padding: 0.8rem; border-radius: 1rem; border: 1px solid rgba(255,255,255,0.2); background: rgba(0,0,0,0.4); color: white; font-family: inherit; }
    .form-field input:focus { outline: none; border-color: #4A90E2; }
    .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #1c1c1e; backdrop-filter: blur(12px); padding: 0.6rem 1.2rem; border-radius: 40px; color: white; z-index: 1000; font-size: 0.85rem; }
    .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.3); border-radius: 50%; border-top-color: white; animation: spin 0.6s linear infinite; margin-right: 6px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<canvas id="particleCanvas"></canvas>
<div class="gradient-overlay"></div>

<div class="container">
  <div class="top-bar">
    <a href="index.html" class="logo"><i class="fas fa-cloud-upload-alt"></i><h1>PDFAir</h1></a>
    <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to Tools</a>
  </div>

  <div class="card">
    <div class="card-header"><i class="fas fa-file-signature"></i><h2>PDF Form Filler</h2></div>
    <p style="margin-bottom: 1rem; opacity: 0.8;">Upload a PDF form, fill in the fields, and download your completed form. Add text, checkboxes, and signatures to any PDF.</p>
    
    <div class="drop-zone" id="dropZone">
      <i class="fas fa-cloud-upload-alt" style="font-size: 3rem; margin-bottom: 1rem; display: block;"></i>
      <div>Drop PDF form here, or click to select</div>
    </div>
    <input type="file" id="fileInput" accept="application/pdf" hidden>
    <div id="fileInfo" class="file-info"></div>
    
    <div id="formFields" class="form-fields">
      <h3><i class="fas fa-edit"></i> Fill Form Fields</h3>
      <div id="fieldsContainer"></div>
      <button id="saveFilledPdf" class="btn btn-primary" style="width: 100%; margin-top: 1rem;"><i class="fas fa-save"></i> Download Filled PDF</button>
    </div>
  </div>
</div>

<script>
  let currentPdfDoc = null;
  let currentFileName = '';
  let formFieldsData = [];
  
  function showToast(msg, isErr = false) {
    let t = document.querySelector('.toast'); if(t) t.remove();
    let div = document.createElement('div'); div.className = 'toast';
    div.innerHTML = `<i class="fas ${isErr ? 'fa-exclamation-triangle' : 'fa-check-circle'}"></i> ${msg}`;
    div.style.background = isErr ? '#ff3b30' : '#1c1c1e';
    document.body.appendChild(div);
    setTimeout(() => div.remove(), 3000);
  }
  
  function formatBytes(b) { if(b===0) return '0 Bytes'; const k=1024; const i=Math.floor(Math.log(b)/Math.log(k)); return parseFloat((b/Math.pow(k,i)).toFixed(1))+' '+['Bytes','KB','MB'][i]; }
  
  const dropZone = document.getElementById('dropZone');
  const fileInput = document.getElementById('fileInput');
  const fileInfoDiv = document.getElementById('fileInfo');
  const formFieldsDiv = document.getElementById('formFields');
  const fieldsContainer = document.getElementById('fieldsContainer');
  
  async function loadPdf(file) {
    return await PDFLib.PDFDocument.load(await file.arrayBuffer());
  }
  
  async function extractFormFields(pdfDoc) {
    const form = pdfDoc.getForm();
    const fields = form.getFields();
    const fieldNames = fields.map(f => f.getName());
    
    if(fieldNames.length === 0) {
      showToast('No fillable form fields found in this PDF. You can add text boxes manually.', true);
      return [];
    }
    
    return fieldNames;
  }
  
  function renderFormFields(fieldNames) {
    formFieldsDiv.style.display = 'block';
    fieldsContainer.innerHTML = '';
    formFieldsData = [];
    
    fieldNames.forEach((name, idx) => {
      const fieldDiv = document.createElement('div');
      fieldDiv.className = 'form-field';
      fieldDiv.innerHTML = `
        <label><i class="fas fa-pen"></i> ${escapeHtml(name)}</label>
        <input type="text" id="field_${idx}" placeholder="Enter ${escapeHtml(name)}" data-field-name="${escapeHtml(name)}">
      `;
      fieldsContainer.appendChild(fieldDiv);
      formFieldsData.push({ name, elementId: `field_${idx}` });
    });
    
    // Add option to add custom text fields
    const addCustomBtn = document.createElement('button');
    addCustomBtn.className = 'btn btn-secondary';
    addCustomBtn.style.marginTop = '1rem';
    addCustomBtn.innerHTML = '<i class="fas fa-plus"></i> Add Custom Text Field';
    addCustomBtn.onclick = () => addCustomTextField();
    fieldsContainer.appendChild(addCustomBtn);
  }
  
  function addCustomTextField() {
    const idx = fieldsContainer.children.length;
    const fieldDiv = document.createElement('div');
    fieldDiv.className = 'form-field';
    fieldDiv.innerHTML = `
      <label><i class="fas fa-font"></i> Custom Text Field</label>
      <input type="text" placeholder="Field label" id="custom_label_${idx}" style="margin-bottom: 0.5rem;">
      <input type="text" placeholder="Enter value" id="custom_value_${idx}">
      <button onclick="this.parentElement.remove()" style="margin-top: 0.5rem; background: none; border: none; color: #FF6B6B; cursor: pointer;">Remove</button>
    `;
    fieldsContainer.insertBefore(fieldDiv, fieldsContainer.lastElementChild);
  }
  
  function escapeHtml(str) { return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]); }
  
  async function setFile(file) {
    currentFileName = file.name;
    fileInfoDiv.innerHTML = `<i class="fas fa-file-pdf"></i> ${file.name} (${formatBytes(file.size)})`;
    
    try {
      currentPdfDoc = await loadPdf(file);
      const fieldNames = await extractFormFields(currentPdfDoc);
      
      if(fieldNames.length > 0) {
        renderFormFields(fieldNames);
        showToast(`✅ Found ${fieldNames.length} fillable fields`);
      } else {
        formFieldsDiv.style.display = 'block';
        fieldsContainer.innerHTML = '<div class="form-field"><p style="color: #FFB347;">No fillable fields detected. You can add custom text fields below.</p></div>';
        const addCustomBtn = document.createElement('button');
        addCustomBtn.className = 'btn btn-secondary';
        addCustomBtn.style.marginTop = '1rem';
        addCustomBtn.innerHTML = '<i class="fas fa-plus"></i> Add Text Field';
        addCustomBtn.onclick = () => addCustomTextField();
        fieldsContainer.appendChild(addCustomBtn);
        showToast('No form fields found. Add custom text boxes instead.', true);
      }
    } catch(e) {
      showToast('Error loading PDF: ' + e.message, true);
    }
  }
  
  dropZone.addEventListener('click', () => fileInput.click());
  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
  dropZone.addEventListener('drop', e => { e.preventDefault(); dropZone.classList.remove('drag-over'); if(e.dataTransfer.files[0] && e.dataTransfer.files[0].type === 'application/pdf') setFile(e.dataTransfer.files[0]); else showToast('Only PDF files', true); });
  fileInput.addEventListener('change', e => { if(e.target.files[0]) setFile(e.target.files[0]); fileInput.value = ''; });
  
  document.getElementById('saveFilledPdf').addEventListener('click', async () => {
    if(!currentPdfDoc) { showToast('No PDF loaded', true); return; }
    
    const saveBtn = document.getElementById('saveFilledPdf');
    saveBtn.disabled = true;
    saveBtn.innerHTML = '<span class="spinner"></span> Generating PDF...';
    
    try {
      const form = currentPdfDoc.getForm();
      
      // Fill existing form fields
      for(let i = 0; i < formFieldsData.length; i++) {
        const field = formFieldsData[i];
        const input = document.getElementById(field.elementId);
        if(input && input.value) {
          try {
            const formField = form.getField(field.name);
            if(formField) formField.setText(input.value);
          } catch(e) {}
        }
      }
      
      // Add custom text fields as annotations
      const pages = currentPdfDoc.getPages();
      const firstPage = pages[0];
      const { width, height } = firstPage.getSize();
      
      let customIndex = 0;
      while(document.getElementById(`custom_label_${customIndex}`)) {
        const labelInput = document.getElementById(`custom_label_${customIndex}`);
        const valueInput = document.getElementById(`custom_value_${customIndex}`);
        if(labelInput && valueInput && valueInput.value) {
          const label = labelInput.value || 'Text';
          firstPage.drawText(`${label}: ${valueInput.value}`, {
            x: 50,
            y: height - 100 - (customIndex * 30),
            size: 10,
            color: PDFLib.rgb(0, 0, 0)
          });
        }
        customIndex++;
      }
      
      const pdfBytes = await currentPdfDoc.save();
      saveAs(new Blob([pdfBytes], { type: 'application/pdf' }), `filled_${currentFileName}`);
      showToast('✅ Form filled and downloaded!');
    } catch(e) {
      showToast('Error: ' + e.message, true);
    } finally {
      saveBtn.disabled = false;
      saveBtn.innerHTML = '<i class="fas fa-save"></i> Download Filled PDF';
    }
  });
  
  // Particle background
  const canvas = document.getElementById('particleCanvas');
  const ctx = canvas.getContext('2d');
  let width, height, particles = [];
  function initParticles() {
    width = window.innerWidth; height = window.innerHeight;
    canvas.width = width; canvas.height = height;
    for(let i = 0; i < 100; i++) particles.push({ x: Math.random() * width, y: Math.random() * height, vx: (Math.random() - 0.5) * 0.3, vy: (Math.random() - 0.5) * 0.3, radius: Math.random() * 2 + 1, alpha: Math.random() * 0.5 + 0.2 });
  }
  function drawParticles() {
    if(!ctx) return;
    ctx.clearRect(0, 0, width, height);
    for(let p of particles) {
      ctx.beginPath(); ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(74, 144, 226, ${p.alpha})`;
      ctx.fill();
      p.x += p.vx; p.y += p.vy;
      if(p.x < 0) p.x = width; if(p.x > width) p.x = 0;
      if(p.y < 0) p.y = height; if(p.y > height) p.y = 0;
    }
    requestAnimationFrame(drawParticles);
  }
  initParticles(); drawParticles();
  window.addEventListener('resize', () => { initParticles(); });
</script>
</body>
</html>
