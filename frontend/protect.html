<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Protect PDF | Convertulo</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #050b14; color: #eef2ff; padding: 2rem 1rem; }
    #starfield { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2; pointer-events: none; }
    .bg-glow { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at 20% 30%, rgba(0,150,255,0.08), transparent 70%), radial-gradient(circle at 80% 70%, rgba(255,100,150,0.08), transparent 70%); z-index: -1; }
    .container { max-width: 600px; margin: 0 auto; position: relative; z-index: 2; }
    .card { background: rgba(15, 25, 45, 0.6); backdrop-filter: blur(16px); border-radius: 2rem; padding: 2rem; border: 1px solid rgba(255,255,255,0.15); }
    .card-header { display: flex; align-items: center; gap: 1rem; margin-bottom: 1.5rem; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 1rem; }
    .card-header i { font-size: 2rem; background: linear-gradient(135deg, #ffb347, #ff6b6b); -webkit-background-clip: text; color: transparent; }
    .drop-zone { background: rgba(255,255,255,0.03); border: 2px dashed rgba(255,180,71,0.4); border-radius: 1.5rem; padding: 3rem 1rem; text-align: center; cursor: pointer; transition: 0.3s; }
    .input-group { margin-top: 1.5rem; display: none; }
    input[type="password"] { width: 100%; padding: 1rem; border-radius: 1rem; border: 1px solid rgba(255,255,255,0.2); background: #0a1423; color: white; margin-bottom: 1rem; }
    .btn-primary { background: linear-gradient(105deg, #ff6b6b, #ffb347); border: none; padding: 1rem; border-radius: 2rem; font-weight: 700; width: 100%; cursor: pointer; color: white; transition: 0.3s; }
    .back-link { display: inline-block; margin-top: 1.5rem; color: #ffb347; text-decoration: none; }
  </style>
</head>
<body>
<canvas id="starfield"></canvas>
<div class="bg-glow"></div>
<div class="container">
  <div class="card">
    <div class="card-header"><i class="fas fa-lock"></i><h1>Protect PDF</h1></div>
    <div class="drop-zone" id="dropZone"><p id="fileNameDisplay">Click to upload PDF</p></div>
    <input type="file" id="fileInput" accept="application/pdf" hidden>
    <div id="controls" class="input-group">
      <input type="password" id="passInput" placeholder="Set PDF Password">
      <button id="actionBtn" class="btn-primary">Encrypt & Download</button>
    </div>
    <div style="text-align: center;"><a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> Back</a></div>
  </div>
</div>
<script>
  const fileInput = document.getElementById('fileInput'), dropZone = document.getElementById('dropZone'), controls = document.getElementById('controls'), actionBtn = document.getElementById('actionBtn'), passInput = document.getElementById('passInput');
  let rawFile = null;
  dropZone.onclick = () => fileInput.click();
  fileInput.onchange = (e) => { if(e.target.files[0]) { rawFile = e.target.files[0]; document.getElementById('fileNameDisplay').innerText = rawFile.name; controls.style.display = 'block'; } };
  actionBtn.onclick = async () => {
    if(!passInput.value) return alert("Enter a password");
    actionBtn.innerText = "Processing...";
    const pdfDoc = await PDFLib.PDFDocument.load(await rawFile.arrayBuffer());
    const bytes = await pdfDoc.save({ userPassword: passInput.value, ownerPassword: passInput.value });
    saveAs(new Blob([bytes]), `protected_${rawFile.name}`);
    actionBtn.innerText = "Encrypt & Download";
  };
  // Starfield logic
  const canvas = document.getElementById('starfield'), ctx = canvas.getContext('2d');
  let w, h, s = [];
  function init() { w=canvas.width=window.innerWidth; h=canvas.height=window.innerHeight; s=Array.from({length:150},()=>({x:Math.random()*w,y:Math.random()*h,vx:(Math.random()-0.5)*0.5,vy:(Math.random()-0.5)*0.5})); }
  function draw() { ctx.clearRect(0,0,w,h); ctx.fillStyle="white"; s.forEach(p=>{ctx.beginPath();ctx.arc(p.x,p.y,1,0,Math.PI*2);ctx.fill();p.x+=p.vx;p.y+=p.vy;if(p.x<0)p.x=w;if(p.x>w)p.x=0;if(p.y<0)p.y=h;if(p.y>h)p.y=0;}); requestAnimationFrame(draw); }
  window.onresize=init; init(); draw();
</script>
</body>
</html>
