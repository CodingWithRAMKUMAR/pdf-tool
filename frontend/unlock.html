<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Unlock PDF – AllCutX | Remove PDF Password Free</title>
  <meta name="description" content="Remove password from PDF files. Unlock encrypted PDFs if you know the password. Free, no upload.">
  <link rel="canonical" href="https://pdf-tool-inky.vercel.app/unlock.html">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
  <style>/* same style block */</style>
</head>
<body>
<div class="container">
  <div class="glass-card">
    <div class="card-header">
      <i class="fas fa-unlock-alt"></i>
      <h2>Unlock PDF</h2>
    </div>
    <div class="drop-zone" id="dropZone">
      <div class="drop-icon"><i class="fas fa-file-pdf"></i></div>
      <div class="drop-text">Drop a password‑protected PDF</div>
    </div>
    <input type="file" id="fileInput" accept="application/pdf" hidden>
    <div id="fileInfo" style="font-size:0.8rem; margin:0.5rem 0;"></div>
    <input type="password" id="password" placeholder="Enter password">
    <button id="unlockBtn" class="btn-primary">Unlock & Download</button>
    <div style="text-align: center; margin-top: 1rem;">
      <a href="/" class="back-link"><i class="fas fa-arrow-left"></i> Back to All Tools</a>
    </div>
  </div>
  <footer>⚡ All processing happens locally – your files never leave your device.</footer>
</div>

<script>
  // helpers
  let unlockFile = null;
  // drop handlers
  unlockBtn.addEventListener('click', async () => {
    if(!unlockFile) { showToast('Select a PDF', true); return; }
    const pwd = document.getElementById('password').value;
    if(!pwd) { showToast('Enter password', true); return; }
    unlockBtn.disabled = true;
    const orig = unlockBtn.innerHTML;
    unlockBtn.innerHTML = '<span class="spinner"></span> Unlocking...';
    try {
      const arrayBuf = await unlockFile.arrayBuffer();
      const doc = await PDFLib.PDFDocument.load(arrayBuf, { password: pwd });
      await saveAndDownload(doc, `unlocked_${unlockFile.name}`);
      showToast(`✅ PDF unlocked`);
    } catch(e) {
      showToast('Wrong password or file is not encrypted', true);
    } finally {
      unlockBtn.disabled = false;
      unlockBtn.innerHTML = orig;
    }
  });
</script>
</body>
</html>
