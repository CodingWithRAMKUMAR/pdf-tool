<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Merge PDF Online – AllCutX | Combine PDFs Free</title>
  <meta name="description" content="Merge multiple PDF files into one document online for free. No uploads, no signup. 100% private and fast.">
  <link rel="canonical" href="https://pdf-tool-inky.vercel.app/merge.html">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(145deg, #0a0f2a 0%, #030618 100%);
      min-height: 100vh;
      padding: 2rem 1rem;
      color: #f0f6ff;
    }
    .container { max-width: 800px; margin: 0 auto; }
    .glass-card {
      background: rgba(20, 25, 50, 0.7);
      backdrop-filter: blur(12px);
      border-radius: 1.5rem;
      border: 1px solid rgba(255,255,255,0.25);
      padding: 1.5rem;
    }
    .card-header {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      margin-bottom: 1.2rem;
      border-bottom: 1px solid rgba(255,255,255,0.15);
      padding-bottom: 0.5rem;
    }
    .card-header i { font-size: 1.8rem; background: linear-gradient(145deg, #ffb347, #ff6b6b); background-clip: text; -webkit-background-clip: text; color: transparent; }
    .card-header h2 { font-size: 1.6rem; font-weight: 600; }
    .drop-zone {
      background: rgba(0,0,0,0.35);
      border: 2px dashed rgba(255,180,70,0.6);
      border-radius: 1rem;
      padding: 1rem;
      text-align: center;
      cursor: pointer;
      margin-bottom: 1rem;
      transition: 0.2s;
    }
    .drop-zone.drag-over { border-color: #ff6b6b; background: rgba(255,107,107,0.2); }
    .drop-icon { font-size: 1.8rem; color: #ffb347; }
    .file-list {
      max-height: 200px;
      overflow-y: auto;
      background: rgba(0,0,0,0.3);
      border-radius: 0.8rem;
      margin: 0.5rem 0;
      padding: 0.2rem;
    }
    .file-item {
      display: flex;
      justify-content: space-between;
      background: rgba(255,255,255,0.06);
      margin: 0.2rem 0;
      padding: 0.4rem 0.6rem;
      border-radius: 0.6rem;
      font-size: 0.8rem;
    }
    .btn-primary {
      background: linear-gradient(105deg, #ff6b6b, #ffb347);
      border: none;
      padding: 0.7rem;
      border-radius: 2rem;
      font-weight: 600;
      width: 100%;
      cursor: pointer;
      color: white;
      margin-top: 0.6rem;
      transition: 0.2s;
    }
    .btn-primary:active { transform: scale(0.98); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: #1e2a3ae0;
      backdrop-filter: blur(12px);
      padding: 0.5rem 1rem;
      border-radius: 40px;
      color: white;
      z-index: 1000;
      border-left: 4px solid #ffb347;
      pointer-events: none;
      font-size: 0.8rem;
    }
    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255,255,255,0.3);
      border-radius: 50%;
      border-top-color: white;
      animation: spin 0.6s linear infinite;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .back-link {
      display: inline-block;
      margin-top: 1rem;
      color: #ffb347;
      text-decoration: none;
      font-size: 0.9rem;
    }
    footer {
      text-align: center;
      margin-top: 2rem;
      font-size: 0.7rem;
      opacity: 0.6;
    }
  </style>
</head>
<body>
<div class="container">
  <div class="glass-card">
    <div class="card-header">
      <i class="fas fa-object-group"></i>
      <h2>Merge PDF</h2>
    </div>
    <div class="drop-zone" id="dropZone">
      <div class="drop-icon"><i class="fas fa-cloud-upload-alt"></i></div>
      <div class="drop-text">Drop PDFs or click to select</div>
    </div>
    <input type="file" id="fileInput" multiple accept="application/pdf" hidden>
    <div id="fileList" class="file-list"></div>
    <button id="mergeBtn" class="btn-primary">Merge & Download</button>
    <div style="text-align: center; margin-top: 1rem;">
      <a href="/" class="back-link"><i class="fas fa-arrow-left"></i> Back to All Tools</a>
    </div>
  </div>
  <footer>⚡ All processing happens locally – your files never leave your device.</footer>
</div>

<script>
  function showToast(msg, isErr = false) {
    let t = document.querySelector('.toast'); if(t) t.remove();
    let div = document.createElement('div'); div.className = 'toast';
    div.innerHTML = `<i class="fas ${isErr ? 'fa-exclamation-triangle' : 'fa-check-circle'}"></i> ${msg}`;
    div.style.background = isErr ? '#b91c1cdd' : '#1f3b4cdd';
    document.body.appendChild(div);
    setTimeout(() => div.remove(), 3000);
  }
  function formatBytes(b) { if(b===0) return '0 Bytes'; const k=1024; const i=Math.floor(Math.log(b)/Math.log(k)); return parseFloat((b/Math.pow(k,i)).toFixed(1))+' '+['Bytes','KB','MB'][i]; }
  function escapeHtml(str) { return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]); }
  async function loadPdf(file) { return await PDFLib.PDFDocument.load(await file.arrayBuffer()); }
  async function saveAndDownload(pdfDoc, filename) { saveAs(new Blob([await pdfDoc.save()], {type:'application/pdf'}), filename); }

  let mergeFiles = [];
  const dropZone = document.getElementById('dropZone');
  const fileInput = document.getElementById('fileInput');
  const fileListDiv = document.getElementById('fileList');
  const mergeBtn = document.getElementById('mergeBtn');

  function renderList() {
    if(!mergeFiles.length) {
      fileListDiv.innerHTML = '<div style="padding:0.4rem;text-align:center;">No PDFs selected</div>';
      return;
    }
    fileListDiv.innerHTML = mergeFiles.map((f,i)=>`
      <div class="file-item">
        <span><i class="fas fa-file-pdf"></i> ${escapeHtml(f.name)} (${formatBytes(f.size)})</span>
        <span><button class="remove-file" data-idx="${i}"><i class="fas fa-trash"></i></button></span>
      </div>
    `).join('');
    document.querySelectorAll('.remove-file').forEach(btn => {
      btn.addEventListener('click', e => {
        mergeFiles.splice(parseInt(btn.dataset.idx),1);
        renderList();
      });
    });
  }

  function addFiles(files) {
    const pdfs = Array.from(files).filter(f => f.type === 'application/pdf');
    if(pdfs.length) {
      mergeFiles.push(...pdfs);
      renderList();
      showToast(`➕ Added ${pdfs.length} PDF(s)`);
    } else {
      showToast('Only PDF files allowed', true);
    }
  }

  dropZone.addEventListener('click', () => fileInput.click());
  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('drag-over');
    addFiles(e.dataTransfer.files);
  });
  fileInput.addEventListener('change', e => {
    addFiles(e.target.files);
    fileInput.value = '';
  });

  mergeBtn.addEventListener('click', async () => {
    if(mergeFiles.length < 2) { showToast('Select at least 2 PDFs', true); return; }
    mergeBtn.disabled = true;
    const orig = mergeBtn.innerHTML;
    mergeBtn.innerHTML = '<span class="spinner"></span> Merging...';
    try {
      const merged = await PDFLib.PDFDocument.create();
      for(let f of mergeFiles) {
        const doc = await loadPdf(f);
        const pages = await merged.copyPages(doc, doc.getPageIndices());
        pages.forEach(p => merged.addPage(p));
      }
      await saveAndDownload(merged, `merged_${Date.now()}.pdf`);
      showToast('✅ Merge successful!');
    } catch(e) {
      showToast('Merge error: ' + e.message, true);
    } finally {
      mergeBtn.disabled = false;
      mergeBtn.innerHTML = orig;
    }
  });
</script>
</body>
</html>
