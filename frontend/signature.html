<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add Signature – Convertulo</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #050b14; color: #eef2ff; padding: 2rem 1rem; }
    #starfield { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2; pointer-events: none; }
    .bg-glow { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at 20% 30%, rgba(0,150,255,0.08), transparent 70%), radial-gradient(circle at 80% 70%, rgba(255,100,150,0.08), transparent 70%); z-index: -1; pointer-events: none; }
    .container { max-width: 800px; margin: 0 auto; position: relative; z-index: 2; }
    .card { background: rgba(15, 25, 45, 0.6); backdrop-filter: blur(16px); border-radius: 2rem; padding: 2rem; border: 1px solid rgba(255,255,255,0.15); }
    .card-header { display: flex; align-items: center; gap: 1rem; margin-bottom: 1.5rem; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 0.8rem; }
    .card-header i { font-size: 2rem; background: linear-gradient(145deg, #ffb347, #ff6b6b); background-clip: text; -webkit-background-clip: text; color: transparent; }
    .card-header h1 { font-size: 1.8rem; font-weight: 600; }
    .drop-zone { background: rgba(0,0,0,0.3); border: 2px dashed rgba(255,180,71,0.6); border-radius: 1.5rem; padding: 1rem; text-align: center; cursor: pointer; transition: 0.2s; margin-bottom: 1rem; }
    .drop-zone.drag-over { border-color: #ff6b6b; background: rgba(255,107,107,0.1); }
    .btn-primary { background: linear-gradient(105deg, #ff6b6b, #ffb347); border: none; padding: 0.8rem; border-radius: 2rem; font-weight: 600; width: 100%; cursor: pointer; color: white; margin-top: 1rem; transition: 0.2s; }
    .btn-primary:active { transform: scale(0.98); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .back-link { display: inline-block; margin-top: 1.5rem; color: #ffb347; text-decoration: none; }
    .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #1c1c1e; backdrop-filter: blur(12px); padding: 0.6rem 1.2rem; border-radius: 40px; color: white; z-index: 1000; font-size: 0.85rem; }
    .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.3); border-radius: 50%; border-top-color: white; animation: spin 0.6s linear infinite; margin-right: 6px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .file-info { background: rgba(255,255,255,0.05); border-radius: 1rem; padding: 0.5rem; margin: 1rem 0; text-align: center; }
    .signature-canvas { border: 2px solid rgba(255,255,255,0.2); border-radius: 1rem; background: white; margin: 1rem 0; cursor: crosshair; }
    .canvas-container { text-align: center; }
    canvas { background: white; border-radius: 0.5rem; }
    .sig-buttons { display: flex; gap: 0.5rem; margin: 0.5rem 0; }
    .sig-buttons button { flex: 1; padding: 0.3rem; border-radius: 1rem; border: none; cursor: pointer; }
  </style>
</head>
<body>
<canvas id="starfield"></canvas>
<div class="bg-glow"></div>
<div class="container">
  <div class="card">
    <div class="card-header"><i class="fas fa-pen-fancy"></i><h1>Add Signature</h1></div>
    <div class="drop-zone" id="dropZone"><div class="drop-icon"><i class="fas fa-cloud-upload-alt"></i></div><div class="drop-text">Drop PDF or click to select</div></div>
    <input type="file" id="fileInput" accept="application/pdf" hidden>
    <div id="fileInfo" class="file-info"></div>
    <div class="canvas-container">
      <canvas id="sigCanvas" width="500" height="200" class="signature-canvas" style="width:100%; height:auto; max-width:500px;"></canvas>
      <div class="sig-buttons"><button id="clearSig">Clear</button><button id="saveSig">Save Signature</button></div>
    </div>
    <button id="addSigBtn" class="btn-primary">Add Signature to PDF</button>
    <div style="text-align: center;"><a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to all tools</a></div>
  </div>
</div>
<script>
  function showToast(msg, isErr = false) {
    let t = document.querySelector('.toast'); if(t) t.remove();
    let div = document.createElement('div'); div.className = 'toast';
    div.innerHTML = `<i class="fas ${isErr ? 'fa-exclamation-triangle' : 'fa-check-circle'}"></i> ${msg}`;
    div.style.background = isErr ? '#ff3b30' : '#1c1c1e';
    document.body.appendChild(div);
    setTimeout(() => div.remove(), 3000);
  }
  function formatBytes(b) { if(b===0) return '0 Bytes'; const k=1024; const i=Math.floor(Math.log(b)/Math.log(k)); return parseFloat((b/Math.pow(k,i)).toFixed(1))+' '+['Bytes','KB','MB'][i]; }
  async function loadPdf(file) { return await PDFLib.PDFDocument.load(await file.arrayBuffer()); }
  async function saveAndDownload(pdfDoc, filename) { saveAs(new Blob([await pdfDoc.save()], {type:'application/pdf'}), filename); }
  
  let currentFile = null;
  let signatureImageData = null;
  const dropZone = document.getElementById('dropZone'), fileInput = document.getElementById('fileInput'), fileInfoDiv = document.getElementById('fileInfo'), addSigBtn = document.getElementById('addSigBtn');
  
  // Signature canvas
  const canvas = document.getElementById('sigCanvas');
  const ctx = canvas.getContext('2d');
  let drawing = false;
  ctx.fillStyle = 'white';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.strokeStyle = '#000';
  ctx.lineWidth = 2;
  ctx.lineCap = 'round';
  
  function getCoords(e) {
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    let clientX, clientY;
    if(e.touches) { clientX = e.touches[0].clientX; clientY = e.touches[0].clientY; }
    else { clientX = e.clientX; clientY = e.clientY; }
    return { x: (clientX - rect.left) * scaleX, y: (clientY - rect.top) * scaleY };
  }
  
  function startDraw(e) { drawing = true; const pos = getCoords(e); ctx.beginPath(); ctx.moveTo(pos.x, pos.y); ctx.stroke(); e.preventDefault(); }
  function draw(e) { if(!drawing) return; const pos = getCoords(e); ctx.lineTo(pos.x, pos.y); ctx.stroke(); ctx.beginPath(); ctx.moveTo(pos.x, pos.y); e.preventDefault(); }
  function endDraw() { drawing = false; ctx.beginPath(); }
  
  canvas.addEventListener('mousedown', startDraw);
  canvas.addEventListener('mousemove', draw);
  canvas.addEventListener('mouseup', endDraw);
  canvas.addEventListener('touchstart', startDraw);
  canvas.addEventListener('touchmove', draw);
  canvas.addEventListener('touchend', endDraw);
  
  document.getElementById('clearSig').addEventListener('click', () => { ctx.fillStyle = 'white'; ctx.fillRect(0, 0, canvas.width, canvas.height); ctx.strokeStyle = '#000'; signatureImageData = null; });
  document.getElementById('saveSig').addEventListener('click', () => { signatureImageData = canvas.toDataURL('image/png'); showToast('Signature saved'); });
  
  function updateFileInfo(file) {
    if(!file) { fileInfoDiv.innerHTML = ''; return; }
    fileInfoDiv.innerHTML = `<i class="fas fa-file-pdf"></i> ${file.name} (${formatBytes(file.size)})`;
  }
  function setFile(file) { currentFile = file; updateFileInfo(file); }
  
  dropZone.addEventListener('click', () => fileInput.click());
  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
  dropZone.addEventListener('drop', e => { e.preventDefault(); dropZone.classList.remove('drag-over'); if(e.dataTransfer.files[0] && e.dataTransfer.files[0].type === 'application/pdf') setFile(e.dataTransfer.files[0]); else showToast('Only PDF files', true); });
  fileInput.addEventListener('change', e => { if(e.target.files[0]) setFile(e.target.files[0]); fileInput.value = ''; });
  
  addSigBtn.addEventListener('click', async () => {
    if(!currentFile) { showToast('Select a PDF', true); return; }
    if(!signatureImageData) { showToast('Draw and save a signature first', true); return; }
    addSigBtn.disabled = true; const orig = addSigBtn.innerHTML; addSigBtn.innerHTML = '<span class="spinner"></span> Adding signature...';
    try {
      const srcDoc = await loadPdf(currentFile);
      const pngImage = await srcDoc.embedPng(signatureImageData.split
