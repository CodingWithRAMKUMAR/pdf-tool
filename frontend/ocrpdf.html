<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OCR PDF - PDFAir | Extract Text from Scanned Documents</title>
  <meta name="description" content="Extract text from scanned PDFs and images using OCR technology. Convert images to editable text instantly.">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #050b14; color: #eef2ff; padding: 2rem 1rem; }
    #particleCanvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2; pointer-events: none; }
    .gradient-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at 20% 30%, rgba(74,144,226,0.08), transparent 60%), radial-gradient(circle at 80% 70%, rgba(255,107,107,0.08), transparent 60%); z-index: -1; pointer-events: none; }
    .container { max-width: 900px; margin: 0 auto; position: relative; z-index: 2; }
    .top-bar { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem; margin-bottom: 2rem; padding: 0.8rem 1.5rem; background: rgba(10,20,35,0.4); backdrop-filter: blur(20px); border-radius: 3rem; border: 1px solid rgba(255,255,255,0.08); }
    .logo { display: flex; align-items: center; gap: 0.8rem; text-decoration: none; }
    .logo h1 { font-size: 1.5rem; background: linear-gradient(135deg, #4A90E2, #FF6B6B, #FFB347); background-clip: text; -webkit-background-clip: text; color: transparent; font-weight: 700; }
    .back-link { color: #4A90E2; text-decoration: none; }
    .card { background: rgba(15,25,45,0.5); backdrop-filter: blur(16px); border-radius: 2rem; padding: 2rem; border: 1px solid rgba(255,255,255,0.1); margin-bottom: 2rem; }
    .card-header { display: flex; align-items: center; gap: 1rem; margin-bottom: 1.5rem; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 1rem; }
    .card-header i { font-size: 2rem; background: linear-gradient(145deg, #4A90E2, #FF6B6B); background-clip: text; -webkit-background-clip: text; color: transparent; }
    .card-header h2 { font-size: 1.5rem; font-weight: 600; }
    .drop-zone { background: rgba(0,0,0,0.3); border: 2px dashed rgba(74,144,226,0.5); border-radius: 1.5rem; padding: 2rem; text-align: center; cursor: pointer; transition: 0.2s; margin-bottom: 1rem; }
    .drop-zone.drag-over { border-color: #FF6B6B; background: rgba(255,107,107,0.1); }
    .btn { padding: 0.8rem 1.5rem; border-radius: 2rem; border: none; font-weight: 600; cursor: pointer; transition: all 0.2s; display: inline-flex; align-items: center; gap: 0.5rem; }
    .btn-primary { background: linear-gradient(135deg, #4A90E2, #FF6B6B); color: white; }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .progress-bar { width: 100%; height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; margin-top: 1rem; overflow: hidden; display: none; }
    .progress-fill { width: 0%; height: 100%; background: linear-gradient(90deg, #4A90E2, #FF6B6B); transition: width 0.3s; }
    .result-area { background: rgba(0,0,0,0.3); border-radius: 1rem; padding: 1rem; margin-top: 1rem; max-height: 300px; overflow-y: auto; font-family: monospace; white-space: pre-wrap; display: none; }
    .file-info { background: rgba(255,255,255,0.05); border-radius: 1rem; padding: 0.5rem; margin: 1rem 0; text-align: center; }
    .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #1c1c1e; backdrop-filter: blur(12px); padding: 0.6rem 1.2rem; border-radius: 40px; color: white; z-index: 1000; font-size: 0.85rem; }
    .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.3); border-radius: 50%; border-top-color: white; animation: spin 0.6s linear infinite; margin-right: 6px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<canvas id="particleCanvas"></canvas>
<div class="gradient-overlay"></div>

<div class="container">
  <div class="top-bar">
    <a href="index.html" class="logo"><i class="fas fa-cloud-upload-alt"></i><h1>PDFAir</h1></a>
    <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to Tools</a>
  </div>

  <div class="card">
    <div class="card-header"><i class="fas fa-language"></i><h2>OCR PDF - Extract Text from Images</h2></div>
    <p style="margin-bottom: 1rem; opacity: 0.8;">Upload a scanned document or image, and we'll extract all text using OCR technology. Works with JPG, PNG, and PDF files.</p>
    
    <div class="drop-zone" id="dropZone">
      <i class="fas fa-cloud-upload-alt" style="font-size: 3rem; margin-bottom: 1rem; display: block;"></i>
      <div>Drop image or PDF here, or click to select</div>
      <small style="opacity: 0.6;">Supports JPG, PNG, PDF (first page only for OCR)</small>
    </div>
    <input type="file" id="fileInput" accept="image/*,application/pdf" hidden>
    <div id="fileInfo" class="file-info"></div>
    
    <div class="progress-bar" id="progressBar"><div class="progress-fill" id="progressFill"></div></div>
    
    <div class="result-area" id="resultArea">
      <h4><i class="fas fa-file-alt"></i> Extracted Text:</h4>
      <div id="extractedText"></div>
      <button id="copyTextBtn" class="btn btn-primary" style="margin-top: 1rem; width: auto; display: none;"><i class="fas fa-copy"></i> Copy to Clipboard</button>
      <button id="downloadTextBtn" class="btn btn-secondary" style="margin-top: 0.5rem; width: auto; display: none;"><i class="fas fa-download"></i> Download as TXT</button>
    </div>
  </div>
</div>

<script>
  let currentFile = null;
  let extractedTextContent = '';
  
  function showToast(msg, isErr = false) {
    let t = document.querySelector('.toast'); if(t) t.remove();
    let div = document.createElement('div'); div.className = 'toast';
    div.innerHTML = `<i class="fas ${isErr ? 'fa-exclamation-triangle' : 'fa-check-circle'}"></i> ${msg}`;
    div.style.background = isErr ? '#ff3b30' : '#1c1c1e';
    document.body.appendChild(div);
    setTimeout(() => div.remove(), 3000);
  }
  
  function formatBytes(b) { if(b===0) return '0 Bytes'; const k=1024; const i=Math.floor(Math.log(b)/Math.log(k)); return parseFloat((b/Math.pow(k,i)).toFixed(1))+' '+['Bytes','KB','MB'][i]; }
  
  function updateProgress(percent) {
    document.getElementById('progressBar').style.display = 'block';
    document.getElementById('progressFill').style.width = percent + '%';
  }
  
  const dropZone = document.getElementById('dropZone');
  const fileInput = document.getElementById('fileInput');
  const fileInfoDiv = document.getElementById('fileInfo');
  const resultArea = document.getElementById('resultArea');
  const extractedTextDiv = document.getElementById('extractedText');
  const copyBtn = document.getElementById('copyTextBtn');
  const downloadBtn = document.getElementById('downloadTextBtn');
  
  function setFile(file) {
    currentFile = file;
    fileInfoDiv.innerHTML = `<i class="fas fa-file-image"></i> ${file.name} (${formatBytes(file.size)})`;
    performOCR(file);
  }
  
  async function performOCR(file) {
    const btn = document.createElement('button');
    resultArea.style.display = 'block';
    extractedTextDiv.innerHTML = '<div class="spinner"></div> Processing OCR... This may take a few seconds.';
    copyBtn.style.display = 'none';
    downloadBtn.style.display = 'none';
    updateProgress(10);
    
    try {
      const imageUrl = URL.createObjectURL(file);
      updateProgress(30);
      
      const worker = await Tesseract.createWorker('eng');
      updateProgress(50);
      
      const { data: { text } } = await worker.recognize(imageUrl);
      updateProgress(90);
      
      await worker.terminate();
      URL.revokeObjectURL(imageUrl);
      
      extractedTextContent = text || '(No text found in image)';
      extractedTextDiv.innerHTML = `<pre style="white-space: pre-wrap; font-family: monospace;">${escapeHtml(extractedTextContent)}</pre>`;
      copyBtn.style.display = 'inline-flex';
      downloadBtn.style.display = 'inline-flex';
      updateProgress(100);
      showToast('✅ Text extracted successfully!');
      
      setTimeout(() => { document.getElementById('progressBar').style.display = 'none'; }, 1000);
    } catch(e) {
      extractedTextDiv.innerHTML = `<div style="color: #FF6B6B;">Error: ${e.message}</div>`;
      showToast('OCR failed: ' + e.message, true);
      document.getElementById('progressBar').style.display = 'none';
    }
  }
  
  function escapeHtml(str) { return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]); }
  
  dropZone.addEventListener('click', () => fileInput.click());
  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
  dropZone.addEventListener('drop', e => { e.preventDefault(); dropZone.classList.remove('drag-over'); if(e.dataTransfer.files[0]) setFile(e.dataTransfer.files[0]); });
  fileInput.addEventListener('change', e => { if(e.target.files[0]) setFile(e.target.files[0]); fileInput.value = ''; });
  
  copyBtn.addEventListener('click', () => {
    navigator.clipboard.writeText(extractedTextContent);
    showToast('📋 Text copied to clipboard!');
  });
  
  downloadBtn.addEventListener('click', () => {
    const blob = new Blob([extractedTextContent], { type: 'text/plain' });
    saveAs(blob, `ocr_text_${Date.now()}.txt`);
    showToast('💾 Text downloaded!');
  });
  
  // Particle background
  const canvas = document.getElementById('particleCanvas');
  const ctx = canvas.getContext('2d');
  let width, height, particles = [];
  function initParticles() {
    width = window.innerWidth; height = window.innerHeight;
    canvas.width = width; canvas.height = height;
    for(let i = 0; i < 100; i++) particles.push({ x: Math.random() * width, y: Math.random() * height, vx: (Math.random() - 0.5) * 0.3, vy: (Math.random() - 0.5) * 0.3, radius: Math.random() * 2 + 1, alpha: Math.random() * 0.5 + 0.2 });
  }
  function drawParticles() {
    if(!ctx) return;
    ctx.clearRect(0, 0, width, height);
    for(let p of particles) {
      ctx.beginPath(); ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(74, 144, 226, ${p.alpha})`;
      ctx.fill();
      p.x += p.vx; p.y += p.vy;
      if(p.x < 0) p.x = width; if(p.x > width) p.x = 0;
      if(p.y < 0) p.y = height; if(p.y > height) p.y = 0;
    }
    requestAnimationFrame(drawParticles);
  }
  initParticles(); drawParticles();
  window.addEventListener('resize', () => { initParticles(); });
</script>
</body>
</html>
