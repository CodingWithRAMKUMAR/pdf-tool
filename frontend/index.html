<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>AllCutX Pro – 15+ PDF Tools</title>
  <meta name="description" content="AllCutX Pro: free PDF tools – merge, split, compress, rotate, extract, watermark, page numbers, delete, protect, unlock, advanced compress, PDF to images, images to PDF, add signature, page reorder, remove metadata. 100% private, no uploads.">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, sans-serif;
      background: #f5f5f7;
      color: #1d1d1f;
      padding: 2rem 1rem;
    }
    .container {
      max-width: 1400px;
      margin: 0 auto;
    }
    /* Header */
    .header {
      text-align: center;
      margin-bottom: 3rem;
    }
    .header h1 {
      font-size: 3rem;
      font-weight: 700;
      background: linear-gradient(135deg, #007aff, #5856d6);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      letter-spacing: -0.02em;
    }
    .header p {
      font-size: 1.1rem;
      color: #6c6c70;
      margin-top: 0.5rem;
    }
    /* Grid */
    .tools-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
      gap: 1.5rem;
    }
    /* Card */
    .card {
      background: rgba(255,255,255,0.8);
      backdrop-filter: blur(10px);
      border-radius: 2rem;
      box-shadow: 0 8px 20px rgba(0,0,0,0.05);
      border: 1px solid rgba(255,255,255,0.5);
      padding: 1.5rem;
      transition: all 0.3s ease;
    }
    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 20px 30px -12px rgba(0,0,0,0.1);
      border-color: rgba(0,122,255,0.3);
    }
    .card-header {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 1.2rem;
      border-bottom: 1px solid rgba(0,0,0,0.05);
      padding-bottom: 0.6rem;
    }
    .card-header i {
      font-size: 1.8rem;
      color: #007aff;
    }
    .card-header h2 {
      font-size: 1.4rem;
      font-weight: 600;
    }
    .drop-zone {
      background: rgba(0,0,0,0.02);
      border: 2px dashed #c6c6c8;
      border-radius: 1.2rem;
      padding: 0.8rem;
      text-align: center;
      cursor: pointer;
      margin-bottom: 1rem;
      transition: 0.2s;
    }
    .drop-zone.drag-over {
      border-color: #007aff;
      background: rgba(0,122,255,0.05);
    }
    .drop-icon {
      font-size: 1.5rem;
      color: #8e8e93;
    }
    .drop-text {
      font-size: 0.9rem;
      color: #6c6c70;
    }
    input, select, textarea {
      width: 100%;
      padding: 0.7rem 1rem;
      border: 1px solid #c6c6c8;
      border-radius: 1rem;
      font-size: 0.9rem;
      background: white;
      margin: 0.5rem 0;
      outline: none;
      transition: 0.2s;
    }
    input:focus, select:focus {
      border-color: #007aff;
      box-shadow: 0 0 0 3px rgba(0,122,255,0.2);
    }
    .btn-primary {
      background: #007aff;
      border: none;
      padding: 0.7rem;
      border-radius: 2rem;
      font-weight: 600;
      width: 100%;
      cursor: pointer;
      color: white;
      margin-top: 0.6rem;
      transition: 0.2s;
    }
    .btn-primary:active {
      transform: scale(0.98);
    }
    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .info-text {
      font-size: 0.7rem;
      color: #8e8e93;
      margin-top: 0.2rem;
    }
    .file-list {
      max-height: 150px;
      overflow-y: auto;
      background: rgba(0,0,0,0.02);
      border-radius: 1rem;
      margin: 0.5rem 0;
      padding: 0.3rem;
    }
    .file-item {
      display: flex;
      justify-content: space-between;
      background: white;
      margin: 0.2rem 0;
      padding: 0.4rem 0.6rem;
      border-radius: 0.8rem;
      font-size: 0.75rem;
      border: 1px solid #e5e5ea;
    }
    .toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: #1c1c1e;
      backdrop-filter: blur(12px);
      padding: 0.6rem 1.2rem;
      border-radius: 40px;
      color: white;
      z-index: 1000;
      font-size: 0.85rem;
      pointer-events: none;
    }
    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255,255,255,0.3);
      border-radius: 50%;
      border-top-color: white;
      animation: spin 0.6s linear infinite;
      margin-right: 6px;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    footer {
      text-align: center;
      margin-top: 3rem;
      font-size: 0.8rem;
      color: #8e8e93;
    }
    @media (max-width: 680px) {
      body { padding: 1rem; }
      .tools-grid { grid-template-columns: 1fr; }
      .card { padding: 1rem; }
    }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>AllCutX Pro ✦</h1>
    <p>15+ free PDF tools • No uploads • Private • Apple‑grade design</p>
  </div>
  <div class="tools-grid" id="toolsGrid"></div>
  <footer>⚡ All operations happen in your browser – your files never leave your device.</footer>
</div>

<script>
  // --------------------------------------------------------------
  // Helper functions
  // --------------------------------------------------------------
  function showToast(msg, isErr = false) {
    let t = document.querySelector('.toast'); if (t) t.remove();
    let div = document.createElement('div'); div.className = 'toast';
    div.innerHTML = `<i class="fas ${isErr ? 'fa-exclamation-triangle' : 'fa-check-circle'}"></i> ${msg}`;
    div.style.background = isErr ? '#ff3b30' : '#1c1c1e';
    document.body.appendChild(div);
    setTimeout(() => div.remove(), 3000);
  }
  function formatBytes(b) {
    if (b === 0) return '0 Bytes';
    const k = 1024;
    const i = Math.floor(Math.log(b) / Math.log(k));
    return parseFloat((b / Math.pow(k, i)).toFixed(1)) + ' ' + ['Bytes', 'KB', 'MB'][i];
  }
  function escapeHtml(str) {
    return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' })[m]);
  }
  async function loadPdf(file) { return await PDFLib.PDFDocument.load(await file.arrayBuffer()); }
  async function saveAndDownload(pdfDoc, filename) { saveAs(new Blob([await pdfDoc.save()], { type: 'application/pdf' }), filename); }
  function stripHtml(html) { if (!html) return ''; const tmp = document.createElement('div'); tmp.innerHTML = html; return tmp.textContent || tmp.innerText || ''; }
  function parseRanges(rangeStr, totalPages) {
    if (rangeStr.trim() === '*') return Array.from({ length: totalPages }, (_, i) => i + 1);
    let parts = rangeStr.split(',');
    let pages = new Set();
    for (let part of parts) {
      part = part.trim();
      if (part.includes('-')) {
        let [s, e] = part.split('-').map(x => x.trim());
        let start = parseInt(s);
        let end = (e === 'end') ? totalPages : parseInt(e);
        if (isNaN(start) || isNaN(end) || start < 1) continue;
        if (end > totalPages) end = totalPages;
        for (let p = start; p <= end; p++) pages.add(p);
      } else if (part !== '') {
        let p = parseInt(part);
        if (!isNaN(p) && p >= 1 && p <= totalPages) pages.add(p);
      }
    }
    return Array.from(pages).sort((a, b) => a - b);
  }

  // Rasterize PDF to JPEG images and rebuild (used by Advanced Compress)
  async function rasterizePdf(file, quality) {
    const arrayBuffer = await file.arrayBuffer();
    const pdfData = new Uint8Array(arrayBuffer);
    const loadingTask = pdfjsLib.getDocument({ data: pdfData });
    const pdfDoc = await loadingTask.promise;
    const pageCount = pdfDoc.numPages;
    const newPdf = await PDFLib.PDFDocument.create();
    for (let i = 1; i <= pageCount; i++) {
      const page = await pdfDoc.getPage(i);
      const viewport = page.getViewport({ scale: 1.0 });
      const canvas = document.createElement('canvas');
      canvas.width = viewport.width;
      canvas.height = viewport.height;
      const ctx = canvas.getContext('2d');
      await page.render({ canvasContext: ctx, viewport }).promise;
      const jpegBlob = await new Promise(resolve => canvas.toBlob(resolve, 'image/jpeg', quality));
      const jpegBytes = await jpegBlob.arrayBuffer();
      const image = await newPdf.embedJpg(jpegBytes);
      const pdfPage = newPdf.addPage([canvas.width, canvas.height]);
      pdfPage.drawImage(image, { x: 0, y: 0, width: canvas.width, height: canvas.height });
    }
    return await newPdf.save();
  }

  // --------------------------------------------------------------
  // Tool definitions (each card will be generated dynamically)
  // --------------------------------------------------------------
  const tools = [
    {
      name: "Merge PDF", icon: "fas fa-object-group", desc: "Combine multiple PDFs",
      html: `<div class="drop-zone" id="mergeDrop"><div class="drop-icon"><i class="fas fa-cloud-upload-alt"></i></div><div class="drop-text">Drop PDFs or click</div></div>
             <input type="file" id="mergeInput" multiple accept="application/pdf" hidden>
             <div id="mergeList" class="file-list"></div>
             <button id="mergeBtn" class="btn-primary">Merge & Download</button>`,
      init: (card) => {
        let mergeFiles = [];
        const drop = card.querySelector('#mergeDrop'), input = card.querySelector('#mergeInput'), listDiv = card.querySelector('#mergeList'), btn = card.querySelector('#mergeBtn');
        function render() {
          if (!mergeFiles.length) { listDiv.innerHTML = '<div style="padding:0.4rem;text-align:center;">No PDFs</div>'; return; }
          listDiv.innerHTML = mergeFiles.map((f, i) => `<div class="file-item"><span>${escapeHtml(f.name)} (${formatBytes(f.size)})</span><button class="remove-file" data-idx="${i}" style="background:none;border:none;color:#ff3b30;cursor:pointer;">✖</button></div>`).join('');
          card.querySelectorAll('.remove-file').forEach(btn => btn.addEventListener('click', e => { mergeFiles.splice(parseInt(btn.dataset.idx), 1); render(); }));
        }
        function addFiles(files) { const pdfs = Array.from(files).filter(f => f.type === 'application/pdf'); if (pdfs.length) { mergeFiles.push(...pdfs); render(); showToast(`➕ Added ${pdfs.length} PDF(s)`); } else showToast('Only PDF files', true); }
        drop.addEventListener('click', () => input.click());
        drop.addEventListener('dragover', e => { e.preventDefault(); drop.classList.add('drag-over'); });
        drop.addEventListener('dragleave', () => drop.classList.remove('drag-over'));
        drop.addEventListener('drop', e => { e.preventDefault(); drop.classList.remove('drag-over'); addFiles(e.dataTransfer.files); });
        input.addEventListener('change', e => { addFiles(e.target.files); input.value = ''; });
        btn.addEventListener('click', async () => {
          if (mergeFiles.length < 2) { showToast('Select at least 2 PDFs', true); return; }
          btn.disabled = true; const orig = btn.innerHTML; btn.innerHTML = '<span class="spinner"></span> Merging...';
          try {
            const merged = await PDFLib.PDFDocument.create();
            for (let f of mergeFiles) { const doc = await loadPdf(f); const pages = await merged.copyPages(doc, doc.getPageIndices()); pages.forEach(p => merged.addPage(p)); }
            await saveAndDownload(merged, `merged_${Date.now()}.pdf`);
            showToast('✅ Merge successful!');
          } catch (e) { showToast('Merge error: ' + e.message, true); }
          finally { btn.disabled = false; btn.innerHTML = orig; }
        });
        render();
      }
    },
    {
      name: "Split PDF", icon: "fas fa-cut", desc: "Extract pages",
      html: `<div class="drop-zone" id="splitDrop"><div class="drop-icon"><i class="fas fa-file-pdf"></i></div><div class="drop-text">Drop a PDF</div></div>
             <input type="file" id="splitInput" accept="application/pdf" hidden>
             <div id="splitInfo" style="font-size:0.75rem"></div>
             <input type="text" id="splitRanges" placeholder="e.g., 1-3,5,7-end  or  *" value="*">
             <div class="info-text">Use "*" to split every page, "end" for last page</div>
             <button id="splitBtn" class="btn-primary">Split & Download ZIP</button>`,
      init: (card) => {
        let splitFile = null;
        const drop = card.querySelector('#splitDrop'), input = card.querySelector('#splitInput'), info = card.querySelector('#splitInfo'), ranges = card.querySelector('#splitRanges'), btn = card.querySelector('#splitBtn');
        function setFile(file) { splitFile = file; info.innerHTML = file ? `<i class="fas fa-file-pdf"></i> ${escapeHtml(file.name)} (${formatBytes(file.size)})` : ''; }
        function handleDrop(files) { let f = Array.from(files).find(f => f.type === 'application/pdf'); if (f) { setFile(f); showToast(`Split ready: ${f.name}`); } else showToast('PDF required', true); }
        drop.addEventListener('click', () => input.click());
        drop.addEventListener('dragover', e => { e.preventDefault(); drop.classList.add('drag-over'); });
        drop.addEventListener('dragleave', () => drop.classList.remove('drag-over'));
        drop.addEventListener('drop', e => { e.preventDefault(); drop.classList.remove('drag-over'); handleDrop(e.dataTransfer.files); });
        input.addEventListener('change', e => { handleDrop(e.target.files); input.value = ''; });
        btn.addEventListener('click', async () => {
          if (!splitFile) { showToast('Select a PDF', true); return; }
          btn.disabled = true; const orig = btn.innerHTML; btn.innerHTML = '<span class="spinner"></span> Splitting...';
          try {
            const doc = await loadPdf(splitFile);
            const total = doc.getPageCount();
            const pages = parseRanges(ranges.value, total);
            if (pages.length === 0) throw new Error('No valid pages');
            const zip = new JSZip();
            for (let p of pages) {
              const newDoc = await PDFLib.PDFDocument.create();
              const [page] = await newDoc.copyPages(doc, [p - 1]);
              newDoc.addPage(page);
              zip.file(`page_${p}.pdf`, await newDoc.save());
            }
            const blob = await zip.generateAsync({ type: 'blob' });
            saveAs(blob, `split_${Date.now()}.zip`);
            showToast(`✅ Split into ${pages.length} pages`);
          } catch (e) { showToast('Split error: ' + e.message, true); }
          finally { btn.disabled = false; btn.innerHTML = orig; }
        });
      }
    },
    {
      name: "Compress PDF", icon: "fas fa-compress", desc: "Basic compression",
      html: `<div class="drop-zone" id="compressDrop"><div class="drop-icon"><i class="fas fa-file-archive"></i></div><div class="drop-text">Drop PDF</div></div>
             <input type="file" id="compressInput" accept="application/pdf" hidden>
             <div id="compressPreview"></div>
             <button id="compressBtn" class="btn-primary">Optimize & Compress</button>`,
      init: (card) => {
        let compressFile = null;
        const drop = card.querySelector('#compressDrop'), input = card.querySelector('#compressInput'), preview = card.querySelector('#compressPreview'), btn = card.querySelector('#compressBtn');
        function setFile(file) { compressFile = file; preview.innerHTML = file ? `<span class="info-text">${escapeHtml(file.name)} (${formatBytes(file.size)})</span>` : ''; }
        function handleDrop(files) { let f = Array.from(files).find(f => f.type === 'application/pdf'); if (f) { setFile(f); showToast(`Ready to compress: ${f.name}`); } else showToast('PDF required', true); }
        drop.addEventListener('click', () => input.click());
        drop.addEventListener('dragover', e => { e.preventDefault(); drop.classList.add('drag-over'); });
        drop.addEventListener('dragleave', () => drop.classList.remove('drag-over'));
        drop.addEventListener('drop', e => { e.preventDefault(); drop.classList.remove('drag-over'); handleDrop(e.dataTransfer.files); });
        input.addEventListener('change', e => { handleDrop(e.target.files); input.value = ''; });
        btn.addEventListener('click', async () => {
          if (!compressFile) { showToast('Select a PDF', true); return; }
          btn.disabled = true; const orig = btn.innerHTML; btn.innerHTML = '<span class="spinner"></span> Compressing...';
          try {
            const doc = await loadPdf(compressFile);
            const compressedBytes = await doc.save({ useObjectStreams: true });
            saveAs(new Blob([compressedBytes], { type: 'application/pdf' }), `compressed_${compressFile.name}`);
            showToast(`✅ Compression done!`);
          } catch (e) { showToast('Compress error: ' + e.message, true); }
          finally { btn.disabled = false; btn.innerHTML = orig; }
        });
      }
    },
    {
      name: "Advanced Compress", icon: "fas fa-chart-line", desc: "Set target size & quality (rasterize)",
      html: `<div class="drop-zone" id="advDrop"><div class="drop-icon"><i class="fas fa-file-archive"></i></div><div class="drop-text">Drop PDF</div></div>
             <input type="file" id="advInput" accept="application/pdf" hidden>
             <div id="advInfo"></div>
             <input type="number" id="targetKB" placeholder="Target size (KB)" value="500">
             <select id="jpegQuality"><option value="0.3">Low (30%)</option><option value="0.5">Medium (50%)</option><option value="0.7">High (70%)</option></select>
             <button id="advCompressBtn" class="btn-primary">Compress to target</button>
             <div class="info-text">Uses JPEG rasterization. Lower quality = smaller file. Experiment to hit target.</div>`,
      init: (card) => {
        let advFile = null;
        const drop = card.querySelector('#advDrop'), input = card.querySelector('#advInput'), info = card.querySelector('#advInfo'), targetKB = card.querySelector('#targetKB'), qualitySelect = card.querySelector('#jpegQuality'), btn = card.querySelector('#advCompressBtn');
        function setFile(file) { advFile = file; info.innerHTML = file ? `<i class="fas fa-file-pdf"></i> ${escapeHtml(file.name)} (${formatBytes(file.size)})` : ''; }
        function handleDrop(files) { let f = Array.from(files).find(f => f.type === 'application/pdf'); if (f) { setFile(f); showToast(`Ready for advanced compress`); } else showToast('PDF required', true); }
        drop.addEventListener('click', () => input.click());
        drop.addEventListener('dragover', e => { e.preventDefault(); drop.classList.add('drag-over'); });
        drop.addEventListener('dragleave', () => drop.classList.remove('drag-over'));
        drop.addEventListener('drop', e => { e.preventDefault(); drop.classList.remove('drag-over'); handleDrop(e.dataTransfer.files); });
        input.addEventListener('change', e => { handleDrop(e.target.files); input.value = ''; });
        btn.addEventListener('click', async () => {
          if (!advFile) { showToast('Select a PDF', true); return; }
          const target = parseInt(targetKB.value);
          if (isNaN(target) || target <= 0) { showToast('Enter valid target size (KB)', true); return; }
          btn.disabled = true; const orig = btn.innerHTML; btn.innerHTML = '<span class="spinner"></span> Compressing...';
          try {
            const quality = parseFloat(qualitySelect.value);
            const compressedBytes = await rasterizePdf(advFile, quality);
            const newSizeKB = compressedBytes.length / 1024;
            if (newSizeKB > target) {
              showToast(`⚠️ Compressed size ${newSizeKB.toFixed(1)}KB > target. Try lower quality.`, true);
            } else {
              showToast(`✅ Compressed to ${newSizeKB.toFixed(1)}KB`);
            }
            saveAs(new Blob([compressedBytes], { type: 'application/pdf' }), `compressed_${advFile.name}`);
          } catch (e) { showToast('Advanced compress error: ' + e.message, true); }
          finally { btn.disabled = false; btn.innerHTML = orig; }
        });
      }
    },
    {
      name: "Rotate PDF", icon: "fas fa-sync-alt", desc: "Rotate all pages",
      html: `<div class="drop-zone" id="rotateDrop"><div class="drop-icon"><i class="fas fa-file-pdf"></i></div><div class="drop-text">Drop PDF</div></div>
             <input type="file" id="rotateInput" accept="application/pdf" hidden>
             <div id="rotateInfo"></div>
             <select id="rotateAngle"><option value="90">90°</option><option value="180">180°</option><option value="270">270°</option></select>
             <button id="rotateBtn" class="btn-primary">Rotate</button>`,
      init: (card) => {
        let rotateFile = null;
        const drop = card.querySelector('#rotateDrop'), input = card.querySelector('#rotateInput'), info = card.querySelector('#rotateInfo'), angleSelect = card.querySelector('#rotateAngle'), btn = card.querySelector('#rotateBtn');
        function setFile(file) { rotateFile = file; info.innerHTML = file ? `<i class="fas fa-file-pdf"></i> ${escapeHtml(file.name)} (${formatBytes(file.size)})` : ''; }
        function handleDrop(files) { let f = Array.from(files).find(f => f.type === 'application/pdf'); if (f) { setFile(f); showToast(`Rotate ready`); } else showToast('PDF required', true); }
        drop.addEventListener('click', () => input.click());
        drop.addEventListener('dragover', e => { e.preventDefault(); drop.classList.add('drag-over'); });
        drop.addEventListener('dragleave', () => drop.classList.remove('drag-over'));
        drop.addEventListener('drop', e => { e.preventDefault(); drop.classList.remove('drag-over'); handleDrop(e.dataTransfer.files); });
        input.addEventListener('change', e => { handleDrop(e.target.files); input.value = ''; });
        btn.addEventListener('click', async () => {
          if (!rotateFile) { showToast('Select a PDF', true); return; }
          btn.disabled = true; const orig = btn.innerHTML; btn.innerHTML = '<span class="spinner"></span> Rotating...';
          try {
            const doc = await loadPdf(rotateFile);
            const angle = parseInt(angleSelect.value);
            doc.getPages().forEach(p => p.setRotation(PDFLib.degrees(angle)));
            await saveAndDownload(doc, `rotated_${rotateFile.name}`);
            showToast(`✅ Rotated ${angle}°`);
          } catch (e) { showToast('Rotate error: ' + e.message, true); }
          finally { btn.disabled = false; btn.innerHTML = orig; }
        });
      }
    },
    {
      name: "Extract Pages", icon: "fas fa-arrow-right", desc: "Extract custom range",
      html: `<div class="drop-zone" id="extractDrop"><div class="drop-icon"><i class="fas fa-file-pdf"></i></div><div class="drop-text">Drop PDF</div></div>
             <input type="file" id="extractInput" accept="application/pdf" hidden>
             <div id="extractInfo"></div>
             <input type="text" id="extractRanges" placeholder="e.g., 1-3,5,7-end" value="1-3">
             <button id="extractBtn" class="btn-primary">Extract</button>`,
      init: (card) => {
        let extractFile = null;
        const drop = card.querySelector('#extractDrop'), input = card.querySelector('#extractInput'), info = card.querySelector('#extractInfo'), ranges = card.querySelector('#extractRanges'), btn = card.querySelector('#extractBtn');
        function setFile(file) { extractFile = file; info.innerHTML = file ? `<i class="fas fa-file-pdf"></i> ${escapeHtml(file.name)} (${formatBytes(file.size)})` : ''; }
        function handleDrop(files) { let f = Array.from(files).find(f => f.type === 'application/pdf'); if (f) { setFile(f); showToast(`Extract ready`); } else showToast('PDF required', true); }
        drop.addEventListener('click', () => input.click());

          info.innerHTML = `${reorderPages.length} pages loaded. Drag to reorder.`;
        }
        function handleDrop(files) { let f = Array.from(files).find(f => f.type === 'application/pdf'); if (f) { loadPages(f); showToast(`Loaded ${f.name}`); } else showToast('PDF required', true); }
        drop.addEventListener('click', () => input.click());
        drop.addEventListener('dragover', e => { e.preventDefault(); drop.classList.add('drag-over'); });
        drop.addEventListener('dragleave', () => drop.classList.remove('drag-over'));
        drop.addEventListener('drop', e => { e.preventDefault(); drop.classList.remove('drag-over'); handleDrop(e.dataTransfer.files); });
        input.addEventListener('change', e => { handleDrop(e.target.files); input.value = ''; });
        btn.addEventListener('click', async () => {
          if (!reorderDoc) { showToast('Load a PDF first', true); return; }
          btn.disabled = true; const orig = btn.innerHTML; btn.innerHTML = '<span class="spinner"></span> Reordering...';
          try {
            const newDoc = await PDFLib.PDFDocument.create();
            for (let idx of reorderPages) { const [page] = await newDoc.copyPages(reorderDoc, [idx]); newDoc.addPage(page); }
            await saveAndDownload(newDoc, `reordered_${Date.now()}.pdf`);
            showToast(`✅ Reordered PDF saved`);
          } catch (e) { showToast('Reorder error: ' + e.message, true); }
          finally { btn.disabled = false; btn.innerHTML = orig; }
        });
      }
    },
    {
      name: "Remove Metadata", icon: "fas fa-info-circle", desc: "Strip all metadata",
      html: `<div class="drop-zone" id="metadataDrop"><div class="drop-icon"><i class="fas fa-file-pdf"></i></div><div class="drop-text">Drop PDF</div></div>
             <input type="file" id="metadataInput" accept="application/pdf" hidden>
             <div id="metadataInfo"></div>
             <button id="metadataBtn" class="btn-primary">Remove Metadata</button>`,
      init: (card) => {
        let metadataFile = null;
        const drop = card.querySelector('#metadataDrop'), input = card.querySelector('#metadataInput'), info = card.querySelector('#metadataInfo'), btn = card.querySelector('#metadataBtn');
        function setFile(file) { metadataFile = file; info.innerHTML = file ? `<i class="fas fa-file-pdf"></i> ${escapeHtml(file.name)} (${formatBytes(file.size)})` : ''; }
        function handleDrop(files) { let f = Array.from(files).find(f => f.type === 'application/pdf'); if (f) { setFile(f); showToast(`Ready to remove metadata`); } else showToast('PDF required', true); }
        drop.addEventListener('click', () => input.click());
        drop.addEventListener('dragover', e => { e.preventDefault(); drop.classList.add('drag-over'); });
        drop.addEventListener('dragleave', () => drop.classList.remove('drag-over'));
        drop.addEventListener('drop', e => { e.preventDefault(); drop.classList.remove('drag-over'); handleDrop(e.dataTransfer.files); });
        input.addEventListener('change', e => { handleDrop(e.target.files); input.value = ''; });
        btn.addEventListener('click', async () => {
          if (!metadataFile) { showToast('Select a PDF', true); return; }
          btn.disabled = true; const orig = btn.innerHTML; btn.innerHTML = '<span class="spinner"></span> Removing...';
          try {
            const doc = await loadPdf(metadataFile);
            doc.setTitle(''); doc.setAuthor(''); doc.setSubject(''); doc.setKeywords([]); doc.setProducer(''); doc.setCreator('');
            await saveAndDownload(doc, `clean_${metadataFile.name}`);
            showToast(`✅ Metadata removed`);
          } catch (e) { showToast('Error: ' + e.message, true); }
          finally { btn.disabled = false; btn.innerHTML = orig; }
        });
      }
    }
  ];

  // Build the grid
  const grid = document.getElementById('toolsGrid');
  tools.forEach(tool => {
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <div class="card-header">
        <i class="${tool.icon}"></i>
        <h2>${tool.name}</h2>
      </div>
      ${tool.html}
    `;
    grid.appendChild(card);
    tool.init(card);
  });
</script>
</body>
</html>
