<!DOCTYPE html>
<html>
<head>
  <title>PDF Ninja 🥷</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #020617, #0f172a);
      color: white;
    }

    .nav {
      position: sticky;
      top: 0;
      background: rgba(0,0,0,0.6);
      padding: 15px;
      text-align: center;
      backdrop-filter: blur(10px);
    }

    .hero {
      text-align: center;
      padding: 50px 20px;
    }

    .hero h1 {
      font-size: 3rem;
    }

    .hero p {
      color: #94a3b8;
    }

    .container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 25px;
      padding: 30px;
    }

    .card {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(12px);
      border-radius: 15px;
      padding: 20px;
      width: 300px;
      text-align: center;
      transition: 0.3s;
    }

    .card:hover {
      transform: scale(1.05);
      box-shadow: 0 20px 50px rgba(0,0,0,0.7);
    }

    input {
      display: none;
    }

    .drop-zone {
      border: 2px dashed #3b82f6;
      padding: 20px;
      border-radius: 10px;
      margin: 10px 0;
      cursor: pointer;
    }

    button {
      padding: 10px 20px;
      border: none;
      border-radius: 6px;
      background: linear-gradient(45deg, #3b82f6, #6366f1);
      color: white;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      transform: scale(1.1);
    }

    .progress {
      margin-top: 10px;
      height: 5px;
      background: #1e293b;
      border-radius: 5px;
      overflow: hidden;
      display: none;
    }

    .bar {
      height: 100%;
      width: 0%;
      background: #3b82f6;
      transition: width 0.3s;
    }

    .footer {
      text-align: center;
      padding: 20px;
      color: #64748b;
    }
  </style>
</head>

<body>

<div class="nav">
  <h2>🥷 PDF Ninja</h2>
</div>

<div class="hero">
  <h1>Handle PDFs Like a Ninja 🥷</h1>
  <p>Fast, free, and slightly cooler than your ex 😏</p>
</div>

<div class="container">

  <!-- MERGE -->
  <div class="card">
    <h3>📎 Merge PDF</h3>
    <div class="drop-zone" id="mergeZone" onclick="document.getElementById('mergeFiles').click()">
      Drop files or click here
    </div>
    <input type="file" id="mergeFiles" multiple>
    <button onclick="animateBar('mergeBar'); mergePDF();">Merge</button>
    <div class="progress"><div class="bar" id="mergeBar"></div></div>
  </div>

  <!-- SPLIT -->
  <div class="card">
    <h3>✂️ Split PDF</h3>
    <div class="drop-zone" id="splitZone" onclick="document.getElementById('splitFile').click()">
      Drop file or click here
    </div>
    <input type="file" id="splitFile">
    <button onclick="animateBar('splitBar'); splitPDF();">Split</button>
    <div class="progress"><div class="bar" id="splitBar"></div></div>
  </div>

  <!-- COMPRESS -->
  <div class="card">
    <h3>🗜 Compress PDF</h3>
    <div class="drop-zone" id="compressZone" onclick="document.getElementById('compressFile').click()">
      Drop file or click here
    </div>
    <input type="file" id="compressFile">
    <button onclick="animateBar('compressBar'); compressPDF();">Compress</button>
    <div class="progress"><div class="bar" id="compressBar"></div></div>
  </div>

</div>

<div class="footer">
  Built with ambition 🚀 | Your PDF deserves better 😎
</div>

<script src="script.js"></script>

<script>
// ================= DRAG & DROP =================
function setupDrop(zoneId, inputId) {
  const zone = document.getElementById(zoneId);
  const input = document.getElementById(inputId);

  zone.addEventListener("dragover", (e) => {
    e.preventDefault();
    zone.style.background = "#1e40af";
  });

  zone.addEventListener("dragleave", () => {
    zone.style.background = "transparent";
  });

  zone.addEventListener("drop", (e) => {
    e.preventDefault();
    zone.style.background = "transparent";
    input.files = e.dataTransfer.files;
  });
}

setupDrop("mergeZone", "mergeFiles");
setupDrop("splitZone", "splitFile");
setupDrop("compressZone", "compressFile");


// ================= PROGRESS =================
function animateBar(id) {
  const bar = document.getElementById(id);
  const container = bar.parentElement;
  container.style.display = "block";

  let width = 0;
  const interval = setInterval(() => {
    width += 10;
    bar.style.width = width + "%";
    if (width >= 100) clearInterval(interval);
  }, 150);
}
</script>

</body>
</html>
