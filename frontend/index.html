<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Convertulo | AI‑Powered PDF Tools</title>
  <meta name="description" content="Convertulo: the most advanced free online PDF toolkit. Merge, split, compress, rotate, extract, watermark, add page numbers, delete pages, protect & unlock PDFs. 100% private, no uploads, no signup.">
  <meta name="keywords" content="pdf merge, split pdf, compress pdf, rotate pdf, extract pdf pages, watermark pdf, add page numbers, delete pdf pages, encrypt pdf, unlock pdf, free pdf tools online, all-in-one pdf editor">
  <meta name="author" content="Ram">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="https://convertulo.vercel.app/">
  <meta property="og:title" content="Convertulo – The Ultimate Free PDF Toolkit">
  <meta property="og:description" content="Merge, split, compress, watermark, encrypt, and more – all in your browser. No uploads, no limits.">
  <meta property="og:type" content="website">
  <meta property="og:image" content="https://placehold.co/1200x630/0a1a2a/7aaef0?text=Convertulo">
  <meta name="twitter:card" content="summary_large_image">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #0a0c15;
      color: #f0f6ff;
      overflow-x: hidden;
      position: relative;
    }

    /* 3D perspective container */
    .wrapper {
      perspective: 1200px;
      transform-style: preserve-3d;
    }

    /* Animated gradient background with floating orbs */
    .bg-animation {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -2;
      overflow: hidden;
    }

    .bg-animation .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.4;
      animation: floatOrb 20s infinite alternate ease-in-out;
    }

    .orb1 { width: 60vw; height: 60vw; background: radial-gradient(circle, #ff6b6b, transparent); top: -20%; left: -20%; }
    .orb2 { width: 50vw; height: 50vw; background: radial-gradient(circle, #4facfe, transparent); bottom: -30%; right: -10%; animation-duration: 25s; }
    .orb3 { width: 40vw; height: 40vw; background: radial-gradient(circle, #ffb347, transparent); top: 40%; left: 50%; animation-duration: 18s; }

    @keyframes floatOrb {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(5%, 5%) scale(1.2); }
    }

    /* Particle canvas (fallback) */
    #particles {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      pointer-events: none;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 2rem 1rem;
      position: relative;
      z-index: 2;
    }

    /* Glass header with 3D tilt */
    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
      margin-bottom: 2rem;
      padding: 1rem 2rem;
      background: rgba(10, 20, 35, 0.3);
      backdrop-filter: blur(16px);
      border-radius: 3rem;
      border: 1px solid rgba(255,255,255,0.15);
      box-shadow: 0 15px 35px rgba(0,0,0,0.2);
      transform-style: preserve-3d;
      transition: transform 0.2s;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 0.8rem;
    }

    .logo img {
      height: 48px;
      width: auto;
      filter: drop-shadow(0 0 10px rgba(255,180,71,0.5));
    }

    .logo h1 {
      font-size: 2rem;
      background: linear-gradient(135deg, #ffb347, #ff6b6b, #4facfe);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      font-weight: 800;
      letter-spacing: -0.02em;
    }

    .search-box {
      position: relative;
      width: 280px;
    }

    .search-box input {
      width: 100%;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 3rem;
      padding: 0.7rem 1rem 0.7rem 2.8rem;
      color: white;
      font-size: 0.9rem;
      backdrop-filter: blur(8px);
      transition: all 0.3s;
    }

    .search-box input:focus {
      outline: none;
      border-color: #ff6b6b;
      box-shadow: 0 0 0 3px rgba(255,107,107,0.3);
      background: rgba(255,255,255,0.1);
    }

    .search-box i {
      position: absolute;
      left: 1rem;
      top: 50%;
      transform: translateY(-50%);
      color: #ffb347;
    }

    /* Hero section with floating animation */
    .hero {
      text-align: center;
      margin-bottom: 3rem;
      animation: fadeInUp 0.8s ease;
    }

    .hero p {
      font-size: 1rem;
      background: rgba(0,0,0,0.3);
      display: inline-block;
      padding: 0.4rem 1.5rem;
      border-radius: 3rem;
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.1);
    }

    .badges {
      display: flex;
      justify-content: center;
      gap: 1rem;
      flex-wrap: wrap;
      margin: 1.5rem 0;
    }

    .badge {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(4px);
      padding: 0.4rem 1.2rem;
      border-radius: 40px;
      font-size: 0.8rem;
      border: 1px solid rgba(255,255,255,0.15);
      transition: all 0.2s;
    }

    .badge:hover {
      border-color: #ffb347;
      transform: translateY(-2px);
    }

    /* 3D card grid */
    .tools-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 2rem;
      margin-bottom: 3rem;
      transform-style: preserve-3d;
    }

    .tool-card {
      background: rgba(15, 25, 45, 0.4);
      backdrop-filter: blur(12px);
      border-radius: 2rem;
      border: 1px solid rgba(255,255,255,0.1);
      padding: 1.8rem;
      transition: all 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      text-decoration: none;
      color: inherit;
      display: block;
      transform-style: preserve-3d;
      transform: translateZ(0) rotateX(0deg);
      box-shadow: 0 10px 20px -5px rgba(0,0,0,0.2);
      position: relative;
    }

    /* 3D tilt effect on hover */
    .tool-card:hover {
      transform: translateY(-10px) rotateX(5deg) rotateY(2deg);
      background: rgba(25, 35, 55, 0.7);
      border-color: rgba(255,180,71,0.6);
      box-shadow: 0 30px 40px -15px rgba(0,0,0,0.4);
    }

    /* Glowing border animation */
    .tool-card::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 2rem;
      padding: 1.5px;
      background: linear-gradient(135deg, rgba(255,180,71,0.6), rgba(255,107,107,0.6));
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
    }

    .tool-card:hover::before {
      opacity: 1;
    }

    .tool-card i {
      font-size: 2.2rem;
      background: linear-gradient(145deg, #ffb347, #ff6b6b);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      margin-bottom: 0.8rem;
      display: inline-block;
      transition: transform 0.2s;
    }

    .tool-card:hover i {
      transform: scale(1.1);
    }

    .tool-card h2 {
      font-size: 1.4rem;
      margin: 0.5rem 0;
      font-weight: 600;
      letter-spacing: -0.01em;
    }

    .tool-card p {
      font-size: 0.85rem;
      opacity: 0.8;
      line-height: 1.5;
    }

    footer {
      text-align: center;
      margin-top: 2rem;
      padding-top: 1.5rem;
      border-top: 1px solid rgba(255,255,255,0.1);
      font-size: 0.8rem;
      backdrop-filter: blur(4px);
    }

    .heart {
      color: #ff6b6b;
    }

    .copyright {
      margin-top: 0.5rem;
      opacity: 0.6;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 680px) {
      .top-bar {
        flex-direction: column;
        align-items: stretch;
        padding: 1rem;
      }
      .search-box {
        width: 100%;
      }
      .tools-grid {
        gap: 1rem;
      }
      .tool-card {
        padding: 1.2rem;
      }
      .logo img {
        height: 36px;
      }
    }
  </style>
</head>
<body>

<div class="bg-animation">
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>
</div>
<canvas id="particles"></canvas>

<div class="wrapper">
  <div class="container">
    <div class="top-bar">
      <div class="logo">
        <!-- Replace this image with your own logo. Upload your logo file and change src accordingly -->
        <img src="https://placehold.co/400x200/ffb347/ffffff?text=Convertulo+Logo" alt="Convertulo Logo" style="max-height: 50px;">
        <h1>Convertulo</h1>
      </div>
      <div class="search-box">
        <i class="fas fa-search"></i>
        <input type="text" id="toolSearch" placeholder="Search tool... e.g., watermark, split">
      </div>
    </div>

    <div class="hero">
      <p>10+ PDF Tools • 100% Free • No Uploads • Private</p>
      <div class="badges">
        <span class="badge"><i class="fas fa-lock"></i> Client‑Side</span>
        <span class="badge"><i class="fas fa-bolt"></i> Blazing Fast</span>
        <span class="badge"><i class="fas fa-shield-alt"></i> No Server</span>
      </div>
    </div>

    <div class="tools-grid" id="toolsGrid"></div>

    <footer>
      <p>Made with <i class="fas fa-heart heart"></i> by Ram — for you, for everyone, for free.</p>
      <p class="copyright">© 2026 Convertulo. All operations are local; your files never leave your device.</p>
    </footer>
  </div>
</div>

<script>
  // Particle system (lightweight, floating dots)
  const canvas = document.getElementById('particles');
  const ctx = canvas.getContext('2d');
  let width, height;
  let particles = [];

  function initParticles() {
    width = window.innerWidth;
    height = window.innerHeight;
    canvas.width = width;
    canvas.height = height;
    particles = [];
    const particleCount = Math.min(120, Math.floor(width * height / 10000));
    for (let i = 0; i < particleCount; i++) {
      particles.push({
        x: Math.random() * width,
        y: Math.random() * height,
        radius: Math.random() * 3 + 1,
        alpha: Math.random() * 0.5 + 0.2,
        vx: (Math.random() - 0.5) * 0.6,
        vy: (Math.random() - 0.5) * 0.6,
      });
    }
  }

  function drawParticles() {
    if (!ctx) return;
    ctx.clearRect(0, 0, width, height);
    for (let p of particles) {
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255, 180, 71, ${p.alpha})`;
      ctx.fill();
      p.x += p.vx;
      p.y += p.vy;
      if (p.x < 0) p.x = width;
      if (p.x > width) p.x = 0;
      if (p.y < 0) p.y = height;
      if (p.y > height) p.y = 0;
    }
    requestAnimationFrame(drawParticles);
  }

  window.addEventListener('resize', () => {
    initParticles();
  });
  initParticles();
  drawParticles();

  // Tool list (same as before, only brand name changed)
  const tools = [
    { name: "Merge PDF", desc: "Combine multiple PDFs into one file", icon: "fas fa-object-group", url: "merge.html" },
    { name: "Split PDF", desc: "Extract pages or split every page", icon: "fas fa-cut", url: "split.html" },
    { name: "Compress PDF", desc: "Reduce file size while maintaining quality", icon: "fas fa-compress", url: "compress.html" },
    { name: "Advanced Compress PDF", desc: "Set target size and compress intelligently", icon: "fas fa-chart-line", url: "compress-advanced.html" },
    { name: "Rotate PDF", desc: "Rotate pages 90°, 180°, or 270°", icon: "fas fa-sync-alt", url: "rotate.html" },
    { name: "Extract Pages", desc: "Extract a custom range of pages", icon: "fas fa-arrow-right", url: "extract.html" },
    { name: "Watermark PDF", desc: "Add custom text watermark", icon: "fas fa-water", url: "watermark.html" },
    { name: "Add Page Numbers", desc: "Add page numbers to your PDF", icon: "fas fa-hashtag", url: "pagenumbers.html" },
    { name: "Delete Pages", desc: "Remove unwanted pages", icon: "fas fa-trash-alt", url: "delete.html" },
    { name: "Protect PDF", desc: "Encrypt with a password", icon: "fas fa-lock", url: "protect.html" },
    { name: "Unlock PDF", desc: "Remove password (if known)", icon: "fas fa-unlock-alt", url: "unlock.html" }
  ];

  const grid = document.getElementById('toolsGrid');
  const searchInput = document.getElementById('toolSearch');

  function renderTools(filter = "") {
    grid.innerHTML = "";
    const filtered = tools.filter(tool => 
      tool.name.toLowerCase().includes(filter) || 
      tool.desc.toLowerCase().includes(filter)
    );
    if (filtered.length === 0) {
      grid.innerHTML = '<div class="tool-card" style="grid-column:1/-1; text-align:center; padding:2rem;">No matching tools found.</div>';
      return;
    }
    filtered.forEach(tool => {
      const card = document.createElement('a');
      card.className = 'tool-card';
      card.href = tool.url;
      card.innerHTML = `
        <i class="${tool.icon}"></i>
        <h2>${tool.name}</h2>
        <p>${tool.desc}</p>
      `;
      grid.appendChild(card);
    });
  }

  renderTools();
  searchInput.addEventListener('input', () => {
    renderTools(searchInput.value.toLowerCase());
  });
</script>
</body>
</html>
