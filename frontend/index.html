<div class="container">
  <div class="top-bar">
    <div class="logo">

    </div>
    <div class="search-box">
      <i class="fas fa-search"></i>
      <input type="text" id="toolSearch" placeholder="Search tool... e.g., watermark, split">
    </div>
  </div>

  <div class="hero">
    <p>10+ PDF Tools • 100% Free • No Uploads • Private</p>
    <div class="badges">
      <span class="badge"><i class="fas fa-lock"></i> Client‑Side</span>
      <span class="badge"><i class="fas fa-bolt"></i> Blazing Fast</span>
      <span class="badge"><i class="fas fa-shield-alt"></i> No Server</span>
    </div>
  </div>

  <div class="tools-grid" id="toolsGrid">
    <!-- All tool cards will be here; they are generated dynamically with JavaScript for easy filtering -->
  </div>

  <footer>
    <p>Made with <i class="fas fa-heart heart"></i> by Ram — for you, for everyone, for free.</p>
    <p class="copyright">© 2026 AllCutX Pro. All operations are local; your files never leave your device.</p>
  </footer>
</div>

<script>
  // ======================= TOOL DEFINITIONS =======================
  // Each tool is an object with name, description, and its unique HTML template + logic.
  // We'll build the grid dynamically to enable filtering.

  const toolsData = [
    { name: "Merge PDF", desc: "Combine multiple PDFs into one", icon: "fas fa-object-group", htmlId: "mergeTool", content: `
      <div class="drop-zone" id="mergeDrop"><div class="drop-icon"><i class="fas fa-cloud-upload-alt"></i></div><div class="drop-text">Drop PDFs or click</div></div>
      <input type="file" id="mergeInput" multiple accept="application/pdf" hidden>
      <div id="mergeList" class="file-list"></div>
      <button id="mergeBtn" class="btn-primary"><i class="fas fa-compress-alt"></i> Merge & Download</button>
    `},
    { name: "Split PDF", desc: "Extract pages or split every page", icon: "fas fa-cut", htmlId: "splitTool", content: `
      <div class="drop-zone" id="splitDrop"><div class="drop-icon"><i class="fas fa-file-pdf"></i></div><div class="drop-text">Drop a PDF</div></div>
      <input type="file" id="splitInput" accept="application/pdf" hidden>
      <div id="splitInfo" style="font-size:0.75rem"></div>
      <input type="text" id="splitRanges" placeholder="e.g., 1-3,5,7-end  or  *" value="*">
      <div class="info-text">Use "*" to split every page, "end" for last page</div>
      <button id="splitBtn" class="btn-primary"><i class="fas fa-scissors"></i> Split & Download ZIP</button>
    `},
    { name: "Compress PDF", desc: "Reduce file size", icon: "fas fa-compress", htmlId: "compressTool", content: `
      <div class="drop-zone" id="compressDrop"><div class="drop-icon"><i class="fas fa-file-archive"></i></div><div class="drop-text">Drop PDF to compress</div></div>
      <input type="file" id="compressInput" accept="application/pdf" hidden>
      <div id="compressPreview"></div>
      <button id="compressBtn" class="btn-primary"><i class="fas fa-waveform"></i> Optimize & Compress</button>
    `},
    { name: "Rotate PDF", desc: "Rotate all pages", icon: "fas fa-sync-alt", htmlId: "rotateTool", content: `
      <div class="drop-zone" id="rotateDrop"><div class="drop-icon"><i class="fas fa-file-pdf"></i></div><div class="drop-text">Drop a PDF</div></div>
      <input type="file" id="rotateInput" accept="application/pdf" hidden>
      <div id="rotateInfo"></div>
      <select id="rotateAngle"><option value="90">90° clockwise</option><option value="180">180°</option><option value="270">270°</option></select>
      <button id="rotateBtn" class="btn-primary"><i class="fas fa-undo-alt"></i> Rotate & Download</button>
    `},
    { name: "Extract Pages", desc: "Extract custom page range", icon: "fas fa-arrow-right", htmlId: "extractTool", content: `
      <div class="drop-zone" id="extractDrop"><div class="drop-icon"><i class="fas fa-file-pdf"></i></div><div class="drop-text">Drop a PDF</div></div>
      <input type="file" id="extractInput" accept="application/pdf" hidden>
      <div id="extractInfo"></div>
      <input type="text" id="extractRanges" placeholder="e.g., 1-3,5,7-end" value="1-3">
      <button id="extractBtn" class="btn-primary"><i class="fas fa-file-export"></i> Extract & Download</button>
    `},
    { name: "Watermark", desc: "Add text watermark", icon: "fas fa-water", htmlId: "watermarkTool", content: `
      <div class="drop-zone" id="watermarkDrop"><div class="drop-icon"><i class="fas fa-file-pdf"></i></div><div class="drop-text">Drop a PDF</div></div>
      <input type="file" id="watermarkInput" accept="application/pdf" hidden>
      <div id="watermarkInfo"></div>
      <input type="text" id="watermarkText" placeholder="Watermark text" value="CONFIDENTIAL">
      <select id="watermarkOpacity"><option value="0.3">Light</option><option value="0.5">Medium</option><option value="0.7">Dark</option></select>
      <button id="watermarkBtn" class="btn-primary"><i class="fas fa-tint"></i> Add Watermark</button>
    `},
    { name: "Add Page Numbers", desc: "Add page numbers to PDF", icon: "fas fa-hashtag", htmlId: "pagenumTool", content: `
      <div class="drop-zone" id="pagenumDrop"><div class="drop-icon"><i class="fas fa-file-pdf"></i></div><div class="drop-text">Drop a PDF</div></div>
      <input type="file" id="pagenumInput" accept="application/pdf" hidden>
      <div id="pagenumInfo"></div>
      <input type="text" id="pageNumFormat" placeholder="Format: Page {n} of {total}" value="Page {n} of {total}">
      <button id="pagenumBtn" class="btn-primary"><i class="fas fa-sort-numeric-up"></i> Add Numbers</button>
    `},
    { name: "Delete Pages", desc: "Remove specified pages", icon: "fas fa-trash-alt", htmlId: "deleteTool", content: `
      <div class="drop-zone" id="deleteDrop"><div class="drop-icon"><i class="fas fa-file-pdf"></i></div><div class="drop-text">Drop a PDF</div></div>
      <input type="file" id="deleteInput" accept="application/pdf" hidden>
      <div id="deleteInfo"></div>
      <input type="text" id="deleteRanges" placeholder="Pages to delete: 2,5-7,9-end" value="">
      <button id="deleteBtn" class="btn-primary"><i class="fas fa-trash"></i> Delete & Download</button>
    `},
    { name: "Protect PDF", desc: "Encrypt with password", icon: "fas fa-lock", htmlId: "protectTool", content: `
      <div class="drop-zone" id="protectDrop"><div class="drop-icon"><i class="fas fa-file-pdf"></i></div><div class="drop-text">Drop a PDF</div></div>
      <input type="file" id="protectInput" accept="application/pdf" hidden>
      <div id="protectInfo"></div>
      <input type="password" id="protectPassword" placeholder="Set a password">
      <button id="protectBtn" class="btn-primary"><i class="fas fa-key"></i> Encrypt & Download</button>
    `},
    { name: "Unlock PDF", desc: "Remove password (if known)", icon: "fas fa-unlock-alt", htmlId: "unlockTool", content: `
      <div class="drop-zone" id="unlockDrop"><div class="drop-icon"><i class="fas fa-file-pdf"></i></div><div class="drop-text">Drop a password‑protected PDF</div></div>
      <input type="file" id="unlockInput" accept="application/pdf" hidden>
      <div id="unlockInfo"></div>
      <input type="password" id="unlockPassword" placeholder="Enter password">
      <button id="unlockBtn" class="btn-primary"><i class="fas fa-lock-open"></i> Unlock & Download</button>
    `}
  ];

  // Build the grid dynamically
  const grid = document.getElementById('toolsGrid');
  function buildGrid(filter = "") {
    grid.innerHTML = "";
    toolsData.forEach((tool, idx) => {
      if (filter && !tool.name.toLowerCase().includes(filter) && !tool.desc.toLowerCase().includes(filter)) return;
      const card = document.createElement('div');
      card.className = 'glass-card';
      card.innerHTML = `
        <div class="card-header">
          <i class="${tool.icon}"></i>
          <h2>${tool.name}</h2>
        </div>
        ${tool.content}
      `;
      grid.appendChild(card);
    });
    // After building, re-attach all event listeners
    attachAllListeners();
  }

  // Helper functions for toast, formatting, etc.
  function showToast(msg, isErr = false) {
    let t = document.querySelector('.toast'); if(t) t.remove();
    let div = document.createElement('div'); div.className = 'toast';
    div.innerHTML = `<i class="fas ${isErr ? 'fa-exclamation-triangle' : 'fa-check-circle'}"></i> ${msg}`;
    div.style.background = isErr ? '#b91c1cdd' : '#1f3b4cdd';
    document.body.appendChild(div);
    setTimeout(() => div.remove(), 3000);
  }
  function formatBytes(b) { if(b===0) return '0 Bytes'; const k=1024; const i=Math.floor(Math.log(b)/Math.log(k)); return parseFloat((b/Math.pow(k,i)).toFixed(1))+' '+['Bytes','KB','MB'][i]; }
  function escapeHtml(str) { return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]); }
  async function loadPdf(file) { return await PDFLib.PDFDocument.load(await file.arrayBuffer()); }
  async function saveAndDownload(pdfDoc, filename) { saveAs(new Blob([await pdfDoc.save()], {type:'application/pdf'}), filename); }

  function parseRanges(rangeStr, totalPages) {
    if(rangeStr.trim() === '*') return Array.from({length: totalPages}, (_,i) => i+1);
    let parts = rangeStr.split(',');
    let pages = new Set();
    for(let part of parts) {
      part = part.trim();
      if(part.includes('-')) {
        let [s,e] = part.split('-').map(x => x.trim());
        let start = parseInt(s);
        let end = (e === 'end') ? totalPages : parseInt(e);
        if(isNaN(start) || isNaN(end) || start<1) continue;
        if(end>totalPages) end=totalPages;
        for(let p=start; p<=end; p++) pages.add(p);
      } else if(part !== '') {
        let p = parseInt(part);
        if(!isNaN(p) && p>=1 && p<=totalPages) pages.add(p);
      }
    }
    return Array.from(pages).sort((a,b)=>a-b);
  }

  // Function to attach all event listeners after grid rebuild
  function attachAllListeners() {
    // MERGE
    let mergeFiles = [];
    const mergeDrop = document.getElementById('mergeDrop');
    const mergeInput = document.getElementById('mergeInput');
    const mergeListDiv = document.getElementById('mergeList');
    const mergeBtn = document.getElementById('mergeBtn');
    if (mergeDrop) {
      function renderMerge() {
        if(!mergeFiles.length) { mergeListDiv.innerHTML = '<div style="padding:0.4rem;text-align:center;">No PDFs</div>'; return; }
        mergeListDiv.innerHTML = mergeFiles.map((f,i)=>`<div class="file-item"><span><i class="fas fa-file-pdf"></i> ${escapeHtml(f.name)} (${formatBytes(f.size)})</span><span><button class="merge-remove" data-idx="${i}"><i class="fas fa-trash"></i></button></span></div>`).join('');
        document.querySelectorAll('.merge-remove').forEach(btn => btn.addEventListener('click', e => { mergeFiles.splice(parseInt(btn.dataset.idx),1); renderMerge(); }));
      }
      function addMerge(files) { let pdfs = Array.from(files).filter(f=>f.type==='application/pdf'); if(pdfs.length) { mergeFiles.push(...pdfs); renderMerge(); showToast(`➕ Added ${pdfs.length} PDF(s)`); } else showToast('Only PDF files', true); }
      mergeDrop.addEventListener('click',()=>mergeInput.click());
      mergeDrop.addEventListener('dragover',e=>{e.preventDefault();mergeDrop.classList.add('drag-over');});
      mergeDrop.addEventListener('dragleave',()=>mergeDrop.classList.remove('drag-over'));
      mergeDrop.addEventListener('drop',e=>{e.preventDefault();mergeDrop.classList.remove('drag-over');addMerge(e.dataTransfer.files);});
      mergeInput.addEventListener('change',e=>{addMerge(e.target.files);e.target.value='';});
      mergeBtn.addEventListener('click',async()=>{
        if(mergeFiles.length<2){showToast('Select at least 2 PDFs',true);return;}
        mergeBtn.disabled=true; let orig=mergeBtn.innerHTML; mergeBtn.innerHTML='<span class="spinner"></span> Merging...';
        try{ let merged=await PDFLib.PDFDocument.create(); for(let f of mergeFiles){ let doc=await loadPdf(f); let pages=await merged.copyPages(doc,doc.getPageIndices()); pages.forEach(p=>merged.addPage(p)); } await saveAndDownload(merged,`merged_${Date.now()}.pdf`); showToast('✅ Merge done!'); }
        catch(e){ showToast('Merge error: '+e.message,true); } finally{ mergeBtn.disabled=false; mergeBtn.innerHTML=orig; }
      });
      renderMerge();
    }

    // SPLIT
    let splitFile=null; const splitDrop=document.getElementById('splitDrop'); const splitInput=document.getElementById('splitInput'); const splitInfo=document.getElementById('splitInfo'); const splitBtn=document.getElementById('splitBtn'); const splitRanges=document.getElementById('splitRanges');
    if(splitDrop){
      function setSplit(file){ splitFile=file; splitInfo.innerHTML=file?`<i class="fas fa-file-pdf"></i> ${escapeHtml(file.name)} (${formatBytes(file.size)})`:''; }
      function handleSplitDrop(files){ let f=Array.from(files).find(f=>f.type==='application/pdf'); if(f){ setSplit(f); showToast(`Split ready: ${f.name}`); } else showToast('PDF required',true); }
      splitDrop.addEventListener('click',()=>splitInput.click());
      splitDrop.addEventListener('dragover',e=>{e.preventDefault();splitDrop.classList.add('drag-over');});
      splitDrop.addEventListener('dragleave',()=>splitDrop.classList.remove('drag-over'));
      splitDrop.addEventListener('drop',e=>{e.preventDefault();splitDrop.classList.remove('drag-over');handleSplitDrop(e.dataTransfer.files);});
      splitInput.addEventListener('change',e=>{handleSplitDrop(e.target.files);e.target.value='';});
      splitBtn.addEventListener('click',async()=>{
        if(!splitFile){showToast('Select a PDF',true);return;} splitBtn.disabled=true; let orig=splitBtn.innerHTML; splitBtn.innerHTML='<span class="spinner"></span> Splitting...';
        try{ let doc=await loadPdf(splitFile); let total=doc.getPageCount(); let ranges=parseRanges(splitRanges.value,total); if(!ranges.length) throw new Error('No pages selected'); let zip=new JSZip(); for(let p of ranges){ let newDoc=await PDFLib.PDFDocument.create(); let [page]=await newDoc.copyPages(doc,[p-1]); newDoc.addPage(page); zip.file(`page_${p}.pdf`,await newDoc.save()); } let blob=await zip.generateAsync({type:'blob'}); saveAs(blob,`split_${Date.now()}.zip`); showToast(`✅ Split into ${ranges.length} pages`); }
        catch(e){ showToast('Split error: '+e.message,true); } finally{ splitBtn.disabled=false; splitBtn.innerHTML=orig; }
      });
    }

    // COMPRESS
    let compressFile=null; const compressDrop=document.getElementById('compressDrop'); const compressInput=document.getElementById('compressInput'); const compressPreview=document.getElementById('compressPreview'); const compressBtn=document.getElementById('compressBtn');
    if(compressDrop){
      function setCompress(file){ compressFile=file; compressPreview.innerHTML=file?`<span class="size-preview"><i class="fas fa-file-pdf"></i> ${escapeHtml(file.name)} · ${formatBytes(file.size)}</span>`:''; }
      function handleCompressDrop(files){ let f=Array.from(files).find(f=>f.type==='application/pdf'); if(f){ setCompress(f); showToast(`Ready to compress: ${f.name}`); } else showToast('PDF required',true); }
      compressDrop.addEventListener('click',()=>compressInput.click());
      compressDrop.addEventListener('dragover',e=>{e.preventDefault();compressDrop.classList.add('drag-over');});
      compressDrop.addEventListener('dragleave',()=>compressDrop.classList.remove('drag-over'));
      compressDrop.addEventListener('drop',e=>{e.preventDefault();compressDrop.classList.remove('drag-over');handleCompressDrop(e.dataTransfer.files);});
      compressInput.addEventListener('change',e=>{handleCompressDrop(e.target.files);e.target.value='';});
      compressBtn.addEventListener('click',async()=>{
        if(!compressFile){showToast('Select a PDF',true);return;} compressBtn.disabled=true; let orig=compressBtn.innerHTML; compressBtn.innerHTML='<span class="spinner"></span> Compressing...';
        try{ let doc=await loadPdf(compressFile); let bytes=await doc.save({useObjectStreams:true}); let blob=new Blob([bytes],{type:'application/pdf'}); saveAs(blob,`compressed_${compressFile.name}`); showToast(`✅ Compression done`); }
        catch(e){ showToast('Compress error: '+e.message,true); } finally{ compressBtn.disabled=false; compressBtn.innerHTML=orig; }
      });
    }

    // ROTATE
    let rotateFile=null; const rotateDrop=document.getElementById('rotateDrop'); const rotateInput=document.getElementById('rotateInput'); const rotateInfo=document.getElementById('rotateInfo'); const rotateBtn=document.getElementById('rotateBtn'); const rotateAngle=document.getElementById('rotateAngle');
    if(rotateDrop){
      function setRotate(file){ rotateFile=file; rotateInfo.innerHTML=file?`<i class="fas fa-file-pdf"></i> ${escapeHtml(file.name)}`:''; }
      function handleRotateDrop(files){ let f=Array.from(files).find(f=>f.type==='application/pdf'); if(f){ setRotate(f); showToast(`Rotate ready`); } else showToast('PDF required',true); }
      rotateDrop.addEventListener('click',()=>rotateInput.click());
      rotateDrop.addEventListener('dragover',e=>{e.preventDefault();rotateDrop.classList.add('drag-over');});
      rotateDrop.addEventListener('dragleave',()=>rotateDrop.classList.remove('drag-over'));
      rotateDrop.addEventListener('drop',e=>{e.preventDefault();rotateDrop.classList.remove('drag-over');handleRotateDrop(e.dataTransfer.files);});
      rotateInput.addEventListener('change',e=>{handleRotateDrop(e.target.files);e.target.value='';});
      rotateBtn.addEventListener('click',async()=>{
        if(!rotateFile){showToast('Select a PDF',true);return;} rotateBtn.disabled=true; let orig=rotateBtn.innerHTML; rotateBtn.innerHTML='<span class="spinner"></span> Rotating...';
        try{ let doc=await loadPdf(rotateFile); let angle=parseInt(rotateAngle.value); doc.getPages().forEach(p=>p.setRotation(PDFLib.degrees(angle))); await saveAndDownload(doc,`rotated_${rotateFile.name}`); showToast(`✅ Rotated ${angle}°`); }
        catch(e){ showToast('Rotate error: '+e.message,true); } finally{ rotateBtn.disabled=false; rotateBtn.innerHTML=orig; }
      });
    }

    // EXTRACT
    let extractFile=null; const extractDrop=document.getElementById('extractDrop'); const extractInput=document.getElementById('extractInput'); const extractInfo=document.getElementById('extractInfo'); const extractBtn=document.getElementById('extractBtn'); const extractRanges=document.getElementById('extractRanges');
    if(extractDrop){
      function setExtract(file){ extractFile=file; extractInfo.innerHTML=file?`<i class="fas fa-file-pdf"></i> ${escapeHtml(file.name)}`:''; }
      function handleExtractDrop(files){ let f=Array.from(files).find(f=>f.type==='application/pdf'); if(f){ setExtract(f); showToast(`Extract ready`); } else showToast('PDF required',true); }
      extractDrop.addEventListener('click',()=>extractInput.click());
      extractDrop.addEventListener('dragover',e=>{e.preventDefault();extractDrop.classList.add('drag-over');});
      extractDrop.addEventListener('dragleave',()=>extractDrop.classList.remove('drag-over'));
      extractDrop.addEventListener('drop',e=>{e.preventDefault();extractDrop.classList.remove('drag-over');handleExtractDrop(e.dataTransfer.files);});
      extractInput.addEventListener('change',e=>{handleExtractDrop(e.target.files);e.target.value='';});
      extractBtn.addEventListener('click',async()=>{
        if(!extractFile){showToast('Select a PDF',true);return;} extractBtn.disabled=true; let orig=extractBtn.innerHTML; extractBtn.innerHTML='<span class="spinner"></span> Extracting...';
        try{ let doc=await loadPdf(extractFile); let total=doc.getPageCount(); let pages=parseRanges(extractRanges.value,total); if(!pages.length) throw new Error('No pages selected'); let newDoc=await PDFLib.PDFDocument.create(); for(let p of pages){ let [page]=await newDoc.copyPages(doc,[p-1]); newDoc.addPage(page); } await saveAndDownload(newDoc,`extracted_${extractFile.name}`); showToast(`✅ Extracted ${pages.length} pages`); }
        catch(e){ showToast('Extract error: '+e.message,true); } finally{ extractBtn.disabled=false; extractBtn.innerHTML=orig; }
      });
    }

    // WATERMARK
    let watermarkFile=null; const watermarkDrop=document.getElementById('watermarkDrop'); const watermarkInput=document.getElementById('watermarkInput'); const watermarkInfo=document.getElementById('watermarkInfo'); const watermarkBtn=document.getElementById('watermarkBtn'); const watermarkText=document.getElementById('watermarkText'); const watermarkOpacity=document.getElementById('watermarkOpacity');
    if(watermarkDrop){
      function setWatermark(file){ watermarkFile=file; watermarkInfo.innerHTML=file?`<i class="fas fa-file-pdf"></i> ${escapeHtml(file.name)}`:''; }
      function handleWatermarkDrop(files){ let f=Array.from(files).find(f=>f.type==='application/pdf'); if(f){ setWatermark(f); showToast(`Watermark ready`); } else showToast('PDF required',true); }
      watermarkDrop.addEventListener('click',()=>watermarkInput.click());
      watermarkDrop.addEventListener('dragover',e=>{e.preventDefault();watermarkDrop.classList.add('drag-over');});
      watermarkDrop.addEventListener('dragleave',()=>watermarkDrop.classList.remove('drag-over'));
      watermarkDrop.addEventListener('drop',e=>{e.preventDefault();watermarkDrop.classList.remove('drag-over');handleWatermarkDrop(e.dataTransfer.files);});
      watermarkInput.addEventListener('change',e=>{handleWatermarkDrop(e.target.files);e.target.value='';});
      watermarkBtn.addEventListener('click',async()=>{
        if(!watermarkFile){showToast('Select a PDF',true);return;} watermarkBtn.disabled=true; let orig=watermarkBtn.innerHTML; watermarkBtn.innerHTML='<span class="spinner"></span> Adding watermark...';
        try{ let doc=await loadPdf(watermarkFile); let text=watermarkText.value||'CONFIDENTIAL'; let opacity=parseFloat(watermarkOpacity.value); let pages=doc.getPages(); for(let page of pages){ let {width,height}=page.getSize(); let fontSize=Math.min(width,height)/10; page.drawText(text,{x:width/2, y:height/2, size:fontSize, opacity, color:PDFLib.rgb(0.7,0.7,0.7), rotate:PDFLib.degrees(45)}); } await saveAndDownload(doc,`watermarked_${watermarkFile.name}`); showToast(`✅ Watermark added`); }
        catch(e){ showToast('Watermark error: '+e.message,true); } finally{ watermarkBtn.disabled=false; watermarkBtn.innerHTML=orig; }
      });
    }

    // PAGE NUMBERS
    let pagenumFile=null; const pagenumDrop=document.getElementById('pagenumDrop'); const pagenumInput=document.getElementById('pagenumInput'); const pagenumInfo=document.getElementById('pagenumInfo'); const pagenumBtn=document.getElementById('pagenumBtn'); const pageNumFormat=document.getElementById('pageNumFormat');
    if(pagenumDrop){
      function setPageNum(file){ pagenumFile=file; pagenumInfo.innerHTML=file?`<i class="fas fa-file-pdf"></i> ${escapeHtml(file.name)}`:''; }
      function handlePageNumDrop(files){ let f=Array.from(files).find(f=>f.type==='application/pdf'); if(f){ setPageNum(f); showToast(`Ready to add numbers`); } else showToast('PDF required',true); }
      pagenumDrop.addEventListener('click',()=>pagenumInput.click());
      pagenumDrop.addEventListener('dragover',e=>{e.preventDefault();pagenumDrop.classList.add('drag-over');});
      pagenumDrop.addEventListener('dragleave',()=>pagenumDrop.classList.remove('drag-over'));
      pagenumDrop.addEventListener('drop',e=>{e.preventDefault();pagenumDrop.classList.remove('drag-over');handlePageNumDrop(e.dataTransfer.files);});
      pagenumInput.addEventListener('change',e=>{handlePageNumDrop(e.target.files);e.target.value='';});
      pagenumBtn.addEventListener('click',async()=>{
        if(!pagenumFile){showToast('Select a PDF',true);return;} pagenumBtn.disabled=true; let orig=pagenumBtn.innerHTML; pagenumBtn.innerHTML='<span class="spinner"></span> Adding numbers...';
        try{ let doc=await loadPdf(pagenumFile); let format=pageNumFormat.value; let pages=doc.getPages(); let total=pages.length; for(let i=0;i<total;i++){ let page=pages[i]; let {width,height}=page.getSize(); let pageNumText=format.replace('{n}',(i+1).toString()).replace('{total}',total.toString()); let fontSize=12; page.drawText(pageNumText,{x:width-50, y:30, size:fontSize, color:PDFLib.rgb(0,0,0)}); } await saveAndDownload(doc,`numbered_${pagenumFile.name}`); showToast(`✅ Page numbers added`); }
        catch(e){ showToast('Page number error: '+e.message,true); } finally{ pagenumBtn.disabled=false; pagenumBtn.innerHTML=orig; }
      });
    }

    // DELETE PAGES
    let deleteFile=null; const deleteDrop=document.getElementById('deleteDrop'); const deleteInput=document.getElementById('deleteInput'); const deleteInfo=document.getElementById('deleteInfo'); const deleteBtn=document.getElementById('deleteBtn'); const deleteRanges=document.getElementById('deleteRanges');
    if(deleteDrop){
      function setDelete(file){ deleteFile=file; deleteInfo.innerHTML=file?`<i class="fas fa-file-pdf"></i> ${escapeHtml(file.name)}`:''; }
      function handleDeleteDrop(files){ let f=Array.from(files).find(f=>f.type==='application/pdf'); if(f){ setDelete(f); showToast(`Ready to delete pages`); } else showToast('PDF required',true); }
      deleteDrop.addEventListener('click',()=>deleteInput.click());
      deleteDrop.addEventListener('dragover',e=>{e.preventDefault();deleteDrop.classList.add('drag-over');});
      deleteDrop.addEventListener('dragleave',()=>deleteDrop.classList.remove('drag-over'));
      deleteDrop.addEventListener('drop',e=>{e.preventDefault();deleteDrop.classList.remove('drag-over');handleDeleteDrop(e.dataTransfer.files);});
      deleteInput.addEventListener('change',e=>{handleDeleteDrop(e.target.files);e.target.value='';});
      deleteBtn.addEventListener('click',async()=>{
        if(!deleteFile){showToast('Select a PDF',true);return;} deleteBtn.disabled=true; let orig=deleteBtn.innerHTML; deleteBtn.innerHTML='<span class="spinner"></span> Deleting pages...';
        try{ let doc=await loadPdf(deleteFile); let total=doc.getPageCount(); let toDelete=parseRanges(deleteRanges.value,total); let keepIndices=Array.from({length:total},(_,i)=>i+1).filter(p=>!toDelete.includes(p)); if(keepIndices.length===0) throw new Error('No pages left after deletion'); let newDoc=await PDFLib.PDFDocument.create(); for(let p of keepIndices){ let [page]=await newDoc.copyPages(doc,[p-1]); newDoc.addPage(page); } await saveAndDownload(newDoc,`deleted_${deleteFile.name}`); showToast(`✅ Deleted ${toDelete.length} pages`); }
        catch(e){ showToast('Delete error: '+e.message,true); } finally{ deleteBtn.disabled=false; deleteBtn.innerHTML=orig; }
      });
    }

    // PROTECT
    let protectFile=null; const protectDrop=document.getElementById('protectDrop'); const protectInput=document.getElementById('protectInput'); const protectInfo=document.getElementById('protectInfo'); const protectBtn=document.getElementById('protectBtn'); const protectPassword=document.getElementById('protectPassword');
    if(protectDrop){
      function setProtect(file){ protectFile=file; protectInfo.innerHTML=file?`<i class="fas fa-file-pdf"></i> ${escapeHtml(file.name)}`:''; }
      function handleProtectDrop(files){ let f=Array.from(files).find(f=>f.type==='application/pdf'); if(f){ setProtect(f); showToast(`Ready to encrypt`); } else showToast('PDF required',true); }
      protectDrop.addEventListener('click',()=>protectInput.click());
      protectDrop.addEventListener('dragover',e=>{e.preventDefault();protectDrop.classList.add('drag-over');});
      protectDrop.addEventListener('dragleave',()=>protectDrop.classList.remove('drag-over'));
      protectDrop.addEventListener('drop',e=>{e.preventDefault();protectDrop.classList.remove('drag-over');handleProtectDrop(e.dataTransfer.files);});
      protectInput.addEventListener('change',e=>{handleProtectDrop(e.target.files);e.target.value='';});
      protectBtn.addEventListener('click',async()=>{
        if(!protectFile){showToast('Select a PDF',true);return;} let pwd=protectPassword.value; if(!pwd){showToast('Enter a password',true);return;} protectBtn.disabled=true; let orig=protectBtn.innerHTML; protectBtn.innerHTML='<span class="spinner"></span> Encrypting...';
        try{ let doc=await loadPdf(protectFile); await doc.encrypt({userPassword:pwd, ownerPassword:pwd, permissions:PDFLib.PDFDocument.AllowAll}); await saveAndDownload(doc,`protected_${protectFile.name}`); showToast(`✅ PDF encrypted with password`); }
        catch(e){ showToast('Encrypt error: '+e.message,true); } finally{ protectBtn.disabled=false; protectBtn.innerHTML=orig; }
      });
    }

    // UNLOCK
    let unlockFile=null; const unlockDrop=document.getElementById('unlockDrop'); const unlockInput=document.getElementById('unlockInput'); const unlockInfo=document.getElementById('unlockInfo'); const unlockBtn=document.getElementById('unlockBtn'); const unlockPassword=document.getElementById('unlockPassword');
    if(unlockDrop){
      function setUnlock(file){ unlockFile=file; unlockInfo.innerHTML=file?`<i class="fas fa-file-pdf"></i> ${escapeHtml(file.name)}`:''; }
      function handleUnlockDrop(files){ let f=Array.from(files).find(f=>f.type==='application/pdf'); if(f){ setUnlock(f); showToast(`Ready to unlock`); } else showToast('PDF required',true); }
      unlockDrop.addEventListener('click',()=>unlockInput.click());
      unlockDrop.addEventListener('dragover',e=>{e.preventDefault();unlockDrop.classList.add('drag-over');});
      unlockDrop.addEventListener('dragleave',()=>unlockDrop.classList.remove('drag-over'));
      unlockDrop.addEventListener('drop',e=>{e.preventDefault();unlockDrop.classList.remove('drag-over');handleUnlockDrop(e.dataTransfer.files);});
      unlockInput.addEventListener('change',e=>{handleUnlockDrop(e.target.files);e.target.value='';});
      unlockBtn.addEventListener('click',async()=>{
        if(!unlockFile){showToast('Select a PDF',true);return;} let pwd=unlockPassword.value; if(!pwd){showToast('Enter password',true);return;} unlockBtn.disabled=true; let orig=unlockBtn.innerHTML; unlockBtn.innerHTML='<span class="spinner"></span> Unlocking...';
        try{ let arrayBuf=await unlockFile.arrayBuffer(); let doc=await PDFLib.PDFDocument.load(arrayBuf,{password:pwd}); await saveAndDownload(doc,`unlocked_${unlockFile.name}`); showToast(`✅ PDF unlocked`); }
        catch(e){ showToast('Wrong password or file is not encrypted',true); } finally{ unlockBtn.disabled=false; unlockBtn.innerHTML=orig; }
      });
    }
  }

  // Initialize grid and search listener
  buildGrid();
  document.getElementById('toolSearch').addEventListener('input', (e) => {
    buildGrid(e.target.value.toLowerCase());
  });
</script>
