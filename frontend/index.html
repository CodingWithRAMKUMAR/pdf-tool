<!DOCTYPE html>
<html>
<head>
  <title>PDF Ninja 🥷</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #020617, #0f172a);
      color: white;
    }

    .hero {
      text-align: center;
      padding: 40px;
    }

    .container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 25px;
      padding: 20px;
    }

    .card {
      background: rgba(255,255,255,0.05);
      padding: 20px;
      border-radius: 15px;
      width: 300px;
      text-align: center;
    }

    .drop-zone {
      border: 2px dashed #3b82f6;
      padding: 20px;
      border-radius: 10px;
      cursor: pointer;
      margin: 10px 0;
    }

    .file-name {
      font-size: 13px;
      color: #93c5fd;
      margin-top: 5px;
    }

    input {
      display: none;
    }

    button {
      padding: 10px;
      border: none;
      border-radius: 5px;
      background: #3b82f6;
      color: white;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div class="hero">
  <h1>🥷 PDF Ninja</h1>
  <p>Drag. Drop. Done. No drama 😎</p>
</div>

<div class="container">

  <!-- MERGE -->
  <div class="card">
    <h3>Merge PDF</h3>
    <div class="drop-zone" id="mergeZone">Drop files here</div>
    <input type="file" id="mergeFiles" multiple>
    <div class="file-name" id="mergeName"></div>
    <button onclick="mergePDF()">Merge</button>
  </div>

  <!-- SPLIT -->
  <div class="card">
    <h3>Split PDF</h3>
    <div class="drop-zone" id="splitZone">Drop file here</div>
    <input type="file" id="splitFile">
    <div class="file-name" id="splitName"></div>
    <button onclick="splitPDF()">Split</button>
  </div>

  <!-- COMPRESS -->
  <div class="card">
    <h3>Compress PDF</h3>
    <div class="drop-zone" id="compressZone">Drop file here</div>
    <input type="file" id="compressFile">
    <div class="file-name" id="compressName"></div>
    <button onclick="compressPDF()">Compress</button>
  </div>

</div>

<script src="script.js"></script>

<script>
// 🔥 DRAG & DROP FIXED
function setupDrop(zoneId, inputId, textId) {
  const zone = document.getElementById(zoneId);
  const input = document.getElementById(inputId);
  const text = document.getElementById(textId);

  zone.addEventListener("click", () => input.click());

  input.addEventListener("change", () => {
    text.innerText = [...input.files].map(f => f.name).join(", ");
  });

  zone.addEventListener("dragover", (e) => {
    e.preventDefault();
    zone.style.background = "#1e40af";
  });

  zone.addEventListener("dragleave", () => {
    zone.style.background = "transparent";
  });

  zone.addEventListener("drop", (e) => {
    e.preventDefault();
    zone.style.background = "transparent";

    const dt = new DataTransfer();

    for (let file of e.dataTransfer.files) {
      dt.items.add(file);
    }

    input.files = dt.files;

    text.innerText = [...input.files].map(f => f.name).join(", ");
  });
}

setupDrop("mergeZone", "mergeFiles", "mergeName");
setupDrop("splitZone", "splitFile", "splitName");
setupDrop("compressZone", "compressFile", "compressName");
</script>

</body>
</html>
