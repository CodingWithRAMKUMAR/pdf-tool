<!DOCTYPE html>
<html>
<head>
  <title>PDF Ninja 🚀</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
      padding: 20px;
    }

    h1 {
      font-size: 40px;
      margin-bottom: 10px;
    }

    .box {
      background: #1e293b;
      padding: 20px;
      margin: 20px auto;
      border-radius: 12px;
      width: 300px;
    }

    button {
      background: #3b82f6;
      color: white;
      border: none;
      padding: 10px 20px;
      margin-top: 10px;
      border-radius: 6px;
      cursor: pointer;
    }

    input {
      margin-top: 10px;
    }
  </style>
</head>

<body>

<h1>PDF Ninja 🥷</h1>
<p>All-in-one PDF tool</p>

<div class="box">
  <h3>Merge PDFs</h3>
  <input type="file" id="mergeFiles" multiple>
  <br>
  <button onclick="mergePDF()">Merge</button>
</div>

<div class="box">
  <h3>Split PDF</h3>
  <input type="file" id="splitFile">
  <br>
  <button onclick="splitPDF()">Split</button>
</div>

<div class="box">
  <h3>Compress PDF</h3>
  <input type="file" id="compressFile">
  <br>
  <button onclick="compressPDF()">Compress</button>
</div>

<!-- IMPORTANT -->
<script src="script.js"></script>

</body>
</html>
