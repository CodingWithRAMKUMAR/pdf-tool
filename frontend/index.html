<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Convertulo | The Ultimate PDF Toolkit</title>
  <meta name="description" content="Convertulo: 20+ free PDF tools – merge, split, compress, rotate, extract, watermark, page numbers, delete, protect, unlock, advanced compress, PDF to images, images to PDF, add signature, page reorder, remove metadata, PDF to text, add QR code, flatten, optimize, grayscale, crop, header/footer. 100% private, no uploads.">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: #050b14;
      color: #eef2ff;
      overflow-x: hidden;
      padding: 2rem 1rem;
    }
    /* 3D Starfield Canvas */
    #starfield {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -2;
      pointer-events: none;
    }
    .bg-glow {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 20% 30%, rgba(0, 150, 255, 0.08), transparent 70%),
                  radial-gradient(circle at 80% 70%, rgba(255, 100, 150, 0.08), transparent 70%);
      z-index: -1;
      pointer-events: none;
    }
    .container { max-width: 1400px; margin: 0 auto; position: relative; z-index: 2; }
    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
      margin-bottom: 2rem;
      padding: 1rem 2rem;
      background: rgba(10, 20, 35, 0.4);
      backdrop-filter: blur(16px);
      border-radius: 3rem;
      border: 1px solid rgba(255,255,255,0.15);
    }
    .logo { display: flex; align-items: center; gap: 0.8rem; }
    .logo i { font-size: 2.2rem; background: linear-gradient(135deg, #ffb347, #ff6b6b, #4facfe); background-clip: text; -webkit-background-clip: text; color: transparent; }
    .logo h1 { font-size: 2rem; background: linear-gradient(135deg, #ffb347, #ff6b6b, #4facfe); background-clip: text; -webkit-background-clip: text; color: transparent; font-weight: 800; }
    .search-box { position: relative; width: 280px; }
    .search-box input {
      width: 100%;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 3rem;
      padding: 0.7rem 1rem 0.7rem 2.8rem;
      color: white;
      font-size: 0.9rem;
      backdrop-filter: blur(8px);
    }
    .search-box input:focus { outline: none; border-color: #ff6b6b; box-shadow: 0 0 0 3px rgba(255,107,107,0.3); background: rgba(255,255,255,0.1); }
    .search-box i { position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: #ffb347; }
    .hero { text-align: center; margin-bottom: 3rem; animation: fadeInUp 0.8s ease; }
    .hero p { font-size: 1rem; background: rgba(0,0,0,0.3); display: inline-block; padding: 0.4rem 1.5rem; border-radius: 3rem; backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.1); }
    .badges { display: flex; justify-content: center; gap: 1rem; flex-wrap: wrap; margin: 1.5rem 0; }
    .badge { background: rgba(255,255,255,0.05); backdrop-filter: blur(4px); padding: 0.4rem 1.2rem; border-radius: 40px; font-size: 0.8rem; border: 1px solid rgba(255,255,255,0.15); transition: 0.2s; }
    .badge:hover { border-color: #ffb347; transform: translateY(-2px); }
    .tools-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 2rem; margin-bottom: 3rem; }
    .tool-card {
      background: rgba(15, 25, 45, 0.5);
      backdrop-filter: blur(12px);
      border-radius: 2rem;
      border: 1px solid rgba(255,255,255,0.1);
      padding: 1.8rem;
      transition: all 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      text-decoration: none;
      color: inherit;
      display: block;
    }
    .tool-card:hover {
      transform: translateY(-10px) rotateX(5deg) rotateY(2deg);
      background: rgba(25, 35, 55, 0.8);
      border-color: rgba(255,180,71,0.6);
      box-shadow: 0 30px 40px -15px rgba(0,0,0,0.4);
    }
    .tool-card::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 2rem;
      padding: 1.5px;
      background: linear-gradient(135deg, rgba(255,180,71,0.6), rgba(255,107,107,0.6));
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
    }
    .tool-card:hover::before { opacity: 1; }
    .tool-card i { font-size: 2.2rem; background: linear-gradient(145deg, #ffb347, #ff6b6b); background-clip: text; -webkit-background-clip: text; color: transparent; margin-bottom: 0.8rem; display: inline-block; }
    .tool-card:hover i { transform: scale(1.1); }
    .tool-card h2 { font-size: 1.4rem; margin: 0.5rem 0; font-weight: 600; }
    .tool-card p { font-size: 0.85rem; opacity: 0.8; line-height: 1.5; }
    footer { text-align: center; margin-top: 2rem; padding-top: 1.5rem; border-top: 1px solid rgba(255,255,255,0.1); font-size: 0.8rem; }
    .heart { color: #ff6b6b; }
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    @media (max-width: 680px) {
      .top-bar { flex-direction: column; align-items: stretch; padding: 1rem; }
      .search-box { width: 100%; }
      .tools-grid { gap: 1rem; }
      .tool-card { padding: 1.2rem; }
    }
  </style>
</head>
<body>
<canvas id="starfield"></canvas>
<div class="bg-glow"></div>
<div class="container">
  <div class="top-bar">
    <div class="logo"><i class="fas fa-file-pdf"></i><h1>Convertulo</h1></div>
    <div class="search-box"><i class="fas fa-search"></i><input type="text" id="toolSearch" placeholder="Search tool..."></div>
  </div>
  <div class="hero"><p>23+ PDF Tools • 100% Free • No Uploads • Private</p><div class="badges"><span class="badge"><i class="fas fa-lock"></i> Client‑Side</span><span class="badge"><i class="fas fa-bolt"></i> Blazing Fast</span><span class="badge"><i class="fas fa-shield-alt"></i> No Server</span></div></div>
  <div class="tools-grid" id="toolsGrid"></div>
  <footer><p>Made with <i class="fas fa-heart heart"></i> by Ram — for you, for everyone, for free.</p><p class="copyright">© 2026 Convertulo. All operations are local; your files never leave your device.</p></footer>
</div>
<script>
  const tools = [
    { name: "Merge PDF", desc: "Combine multiple PDFs", icon: "fas fa-object-group", url: "merge.html" },
    { name: "Split PDF", desc: "Extract pages or split every page", icon: "fas fa-cut", url: "split.html" },
    { name: "Compress PDF", desc: "Reduce file size (basic)", icon: "fas fa-compress", url: "compress.html" },
    { name: "Advanced Compress", desc: "Set target size & quality", icon: "fas fa-chart-line", url: "advcompress.html" },
    { name: "Rotate PDF", desc: "Rotate pages 90°, 180°, 270°", icon: "fas fa-sync-alt", url: "rotate.html" },
    { name: "Extract Pages", desc: "Save a custom page range", icon: "fas fa-arrow-right", url: "extract.html" },
    { name: "Watermark", desc: "Add text watermark", icon: "fas fa-water", url: "watermark.html" },
    { name: "Add Page Numbers", desc: "Custom format page numbers", icon: "fas fa-hashtag", url: "pagenumbers.html" },
    { name: "Delete Pages", desc: "Remove unwanted pages", icon: "fas fa-trash-alt", url: "delete.html" },
    { name: "Protect PDF", desc: "Encrypt with password", icon: "fas fa-lock", url: "protect.html" },
    { name: "Unlock PDF", desc: "Remove password (if known)", icon: "fas fa-unlock-alt", url: "unlock.html" },
    { name: "PDF to Images", desc: "Convert each page to PNG/JPG", icon: "fas fa-images", url: "pdftoimages.html" },
    { name: "Images to PDF", desc: "Combine images into PDF", icon: "fas fa-file-image", url: "imagestopdf.html" },
    { name: "Add Signature", desc: "Draw & place signature", icon: "fas fa-pen-fancy", url: "signature.html" },
    { name: "Page Reorder", desc: "Drag & drop to reorder", icon: "fas fa-arrows-alt", url: "reorder.html" },
    { name: "Remove Metadata", desc: "Strip all metadata", icon: "fas fa-info-circle", url: "metadata.html" },
    { name: "PDF to Text", desc: "Extract text from PDF", icon: "fas fa-file-alt", url: "pdftotext.html" },
    { name: "Add QR Code", desc: "Stamp a QR code on PDF", icon: "fas fa-qrcode", url: "addqrcode.html" },
    { name: "Flatten PDF", desc: "Flatten form fields & annotations", icon: "fas fa-layer-group", url: "flatten.html" },
    { name: "Optimize PDF", desc: "Remove unused objects", icon: "fas fa-rocket", url: "optimize.html" },
    { name: "Grayscale PDF", desc: "Convert to grayscale", icon: "fas fa-adjust", url: "grayscale.html" },
    { name: "Crop PDF", desc: "Crop pages to a rectangle", icon: "fas fa-crop-alt", url: "crop.html" },
    { name: "Add Header/Footer", desc: "Add custom header/footer", icon: "fas fa-heading", url: "headerfooter.html" }
  ];
  const grid = document.getElementById('toolsGrid');
  const searchInput = document.getElementById('toolSearch');
  function renderTools(filter = "") {
    grid.innerHTML = "";
    const filtered = tools.filter(t => t.name.toLowerCase().includes(filter) || t.desc.toLowerCase().includes(filter));
    if (filtered.length === 0) { grid.innerHTML = '<div class="tool-card" style="grid-column:1/-1; text-align:center; padding:2rem;">No matching tools found.</div>'; return; }
    filtered.forEach(tool => {
      const card = document.createElement('a'); card.className = 'tool-card'; card.href = tool.url;
      card.innerHTML = `<i class="${tool.icon}"></i><h2>${tool.name}</h2><p>${tool.desc}</p>`;
      grid.appendChild(card);
    });
  }
  renderTools();
  searchInput.addEventListener('input', () => renderTools(searchInput.value.toLowerCase()));
  // Starfield particle system
  const canvas = document.getElementById('starfield');
  const ctx = canvas.getContext('2d');
  let width, height, stars = [];
  function initStars() {
    width = window.innerWidth; height = window.innerHeight;
    canvas.width = width; canvas.height = height;
    stars = [];
    const starCount = Math.min(400, Math.floor(width * height / 3000));
    for (let i = 0; i < starCount; i++) {
      stars.push({
        x: Math.random() * width, y: Math.random() * height,
        radius: Math.random() * 2.5 + 0.5, alpha: Math.random() * 0.8 + 0.2,
        vx: (Math.random() - 0.5) * 0.3, vy: (Math.random() - 0.5) * 0.3,
        pulse: Math.random() * Math.PI * 2
      });
    }
  }
  function drawStars() {
    if (!ctx) return;
    ctx.clearRect(0, 0, width, height);
    for (let s of stars) {
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.radius, 0, Math.PI * 2);
      const glow = Math.sin(Date.now() * 0.001 + s.pulse) * 0.3 + 0.5;
      ctx.fillStyle = `rgba(255, 200, 100, ${s.alpha * glow})`;
      ctx.fill();
      s.x += s.vx; s.y += s.vy;
      if (s.x < 0) s.x = width; if (s.x > width) s.x = 0;
      if (s.y < 0) s.y = height; if (s.y > height) s.y = 0;
    }
    requestAnimationFrame(drawStars);
  }
  window.addEventListener('resize', () => initStars());
  initStars();
  drawStars();
</script>
</body>
</html>
