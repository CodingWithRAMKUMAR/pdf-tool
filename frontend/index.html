<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>AllCutX Pro | The Ultimate Free PDF Toolkit</title>
  <meta name="description" content="AllCutX Pro: the most powerful free online PDF tool. Merge, split, compress, rotate, extract, watermark, add page numbers, delete pages, protect & unlock PDFs. 100% private, no uploads, no signup. SEO optimized.">
  <meta name="keywords" content="pdf merge, split pdf, compress pdf, rotate pdf, extract pdf pages, watermark pdf, add page numbers, delete pdf pages, encrypt pdf, unlock pdf, free pdf tools online, all-in-one pdf editor">
  <meta name="author" content="Ram">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="https://pdf-tool-inky.vercel.app/">
  <meta property="og:title" content="AllCutX Pro – The Ultimate Free PDF Toolkit">
  <meta property="og:description" content="Merge, split, compress, watermark, encrypt, and more – all in your browser. No uploads, no limits.">
  <meta property="og:type" content="website">
  <meta property="og:image" content="https://placehold.co/1200x630/0a1a2a/7aaef0?text=AllCutX">
  <meta name="twitter:card" content="summary_large_image">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: radial-gradient(circle at 10% 20%, #0f172a, #020617);
      min-height: 100vh;
      padding: 2rem 1rem;
      color: #f1f5f9;
      position: relative;
    }

    /* Animated background gradient */
    body::before {
      content: '';
      position: fixed;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(255, 180, 71, 0.08), rgba(99, 102, 241, 0.08));
      animation: rotate 40s linear infinite;
      z-index: -2;
      pointer-events: none;
    }

    @keyframes rotate {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    body::after {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(ellipse at 70% 30%, rgba(255, 107, 107, 0.08), transparent 60%);
      pointer-events: none;
      z-index: -1;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
    }

    /* Top bar with glass effect */
    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
      margin-bottom: 2rem;
      padding: 1rem 1.5rem;
      background: rgba(15, 23, 42, 0.5);
      backdrop-filter: blur(16px);
      border-radius: 2rem;
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 8px 20px rgba(0,0,0,0.2);
    }

    .logo h1 {
      font-size: 2rem;
      background: linear-gradient(135deg, #ffb347, #ff6b6b, #4facfe);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      font-weight: 800;
      text-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    .search-box {
      position: relative;
      width: 280px;
    }

    .search-box input {
      width: 100%;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 3rem;
      padding: 0.6rem 1rem 0.6rem 2.5rem;
      color: white;
      font-size: 0.9rem;
      backdrop-filter: blur(8px);
      transition: all 0.2s;
    }

    .search-box input:focus {
      outline: none;
      border-color: #ff6b6b;
      background: rgba(255,255,255,0.15);
      box-shadow: 0 0 0 3px rgba(255,107,107,0.2);
    }

    .search-box i {
      position: absolute;
      left: 1rem;
      top: 50%;
      transform: translateY(-50%);
      color: #ffb347;
    }

    /* Hero section */
    .hero {
      text-align: center;
      margin-bottom: 2rem;
    }

    .hero p {
      font-size: 1rem;
      opacity: 0.9;
      background: rgba(0,0,0,0.2);
      display: inline-block;
      padding: 0.3rem 1.2rem;
      border-radius: 2rem;
      backdrop-filter: blur(4px);
    }

    .badges {
      display: flex;
      justify-content: center;
      gap: 0.8rem;
      flex-wrap: wrap;
      margin: 1rem 0;
    }

    .badge {
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(4px);
      padding: 0.3rem 1rem;
      border-radius: 40px;
      font-size: 0.8rem;
      border: 1px solid rgba(255,255,255,0.2);
      transition: 0.2s;
    }

    .badge:hover {
      border-color: #ffb347;
      background: rgba(255,180,71,0.1);
    }

    /* Tool cards grid */
    .tools-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 1.8rem;
      margin-bottom: 3rem;
    }

    /* Enhanced glass card */
    .tool-card {
      background: rgba(20, 25, 50, 0.6);
      backdrop-filter: blur(12px);
      border-radius: 1.8rem;
      border: 1px solid rgba(255,255,255,0.2);
      padding: 1.5rem;
      transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      text-decoration: none;
      color: inherit;
      display: block;
      position: relative;
      overflow: hidden;
    }

    .tool-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(120deg, rgba(255,180,71,0.1), rgba(255,107,107,0.1));
      opacity: 0;
      transition: opacity 0.3s;
    }

    .tool-card:hover {
      transform: translateY(-6px);
      border-color: #ffb347;
      box-shadow: 0 20px 30px -12px rgba(0,0,0,0.4);
    }

    .tool-card:hover::before {
      opacity: 1;
    }

    .tool-card i {
      font-size: 2rem;
      background: linear-gradient(145deg, #ffb347, #ff6b6b);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      margin-bottom: 0.5rem;
      display: inline-block;
      transition: transform 0.2s;
    }

    .tool-card:hover i {
      transform: scale(1.05);
    }

    .tool-card h2 {
      font-size: 1.3rem;
      margin: 0.5rem 0;
      font-weight: 600;
    }

    .tool-card p {
      font-size: 0.85rem;
      opacity: 0.8;
      line-height: 1.4;
    }

    /* Footer */
    footer {
      text-align: center;
      margin-top: 2rem;
      padding-top: 1.5rem;
      border-top: 1px solid rgba(255,255,255,0.1);
      font-size: 0.8rem;
      backdrop-filter: blur(4px);
    }

    .heart {
      color: #ff6b6b;
    }

    .copyright {
      margin-top: 0.5rem;
      opacity: 0.6;
    }

    @media (max-width: 680px) {
      .top-bar {
        flex-direction: column;
        align-items: stretch;
      }
      .search-box {
        width: 100%;
      }
      .hero h1 {
        font-size: 2rem;
      }
      .tools-grid {
        gap: 1rem;
      }
    }
  </style>
</head>
<body>
<div class="container">
  <div class="top-bar">
    <div class="logo">
      <h1>AllCutX Pro ✦</h1>
    </div>
    <div class="search-box">
      <i class="fas fa-search"></i>
      <input type="text" id="toolSearch" placeholder="Search tool... e.g., watermark, split">
    </div>
  </div>

  <div class="hero">
    <p>10+ PDF Tools • 100% Free • No Uploads • Private</p>
    <div class="badges">
      <span class="badge"><i class="fas fa-lock"></i> Client‑Side</span>
      <span class="badge"><i class="fas fa-bolt"></i> Blazing Fast</span>
      <span class="badge"><i class="fas fa-shield-alt"></i> No Server</span>
    </div>
  </div>

  <div class="tools-grid" id="toolsGrid">
    <!-- Cards will be generated by JavaScript -->
  </div>

  <footer>
    <p>Made with <i class="fas fa-heart heart"></i> by Ram — for you, for everyone, for free.</p>
    <p class="copyright">© 2026 AllCutX Pro. All operations are local; your files never leave your device.</p>
  </footer>
</div>

<script>
  const tools = [
    { name: "Merge PDF", desc: "Combine multiple PDFs into one file", icon: "fas fa-object-group", url: "merge.html" },
    { name: "Split PDF", desc: "Extract pages or split every page", icon: "fas fa-cut", url: "split.html" },
    { name: "Compress PDF", desc: "Reduce file size while maintaining quality", icon: "fas fa-compress", url: "compress.html" },
    { name: "Advanced Compress PDF", desc: "Set target size and compress intelligently", icon: "fas fa-chart-line", url: "compress-advanced.html" },
    { name: "Rotate PDF", desc: "Rotate pages 90°, 180°, or 270°", icon: "fas fa-sync-alt", url: "rotate.html" },
    { name: "Extract Pages", desc: "Extract a custom range of pages", icon: "fas fa-arrow-right", url: "extract.html" },
    { name: "Watermark PDF", desc: "Add custom text watermark", icon: "fas fa-water", url: "watermark.html" },
    { name: "Add Page Numbers", desc: "Add page numbers to your PDF", icon: "fas fa-hashtag", url: "pagenumbers.html" },
    { name: "Delete Pages", desc: "Remove unwanted pages", icon: "fas fa-trash-alt", url: "delete.html" },
    { name: "Protect PDF", desc: "Encrypt with a password", icon: "fas fa-lock", url: "protect.html" },
    { name: "Unlock PDF", desc: "Remove password (if known)", icon: "fas fa-unlock-alt", url: "unlock.html" }
  ];

  const grid = document.getElementById('toolsGrid');
  const searchInput = document.getElementById('toolSearch');

  function renderTools(filter = "") {
    grid.innerHTML = "";
    const filtered = tools.filter(tool => 
      tool.name.toLowerCase().includes(filter) || 
      tool.desc.toLowerCase().includes(filter)
    );
    if (filtered.length === 0) {
      grid.innerHTML = '<div class="tool-card" style="grid-column:1/-1; text-align:center; padding:2rem;">No matching tools found.</div>';
      return;
    }
    filtered.forEach(tool => {
      const card = document.createElement('a');
      card.className = 'tool-card';
      card.href = tool.url;
      card.innerHTML = `
        <i class="${tool.icon}"></i>
        <h2>${tool.name}</h2>
        <p>${tool.desc}</p>
      `;
      grid.appendChild(card);
    });
  }

  renderTools();
  searchInput.addEventListener('input', () => {
    renderTools(searchInput.value.toLowerCase());
  });
</script>
</body>
</html>
