<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add Watermark to PDF – AllCutX | Free PDF Watermarker</title>
  <meta name="description" content="Add custom text watermark to PDF documents. Choose opacity, free and private.">
  <link rel="canonical" href="https://pdf-tool-inky.vercel.app/watermark.html">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
  <style>/* same style as extract.html */</style>
</head>
<body>
<div class="container">
  <div class="glass-card">
    <div class="card-header">
      <i class="fas fa-water"></i>
      <h2>Watermark PDF</h2>
    </div>
    <div class="drop-zone" id="dropZone">
      <div class="drop-icon"><i class="fas fa-file-pdf"></i></div>
      <div class="drop-text">Drop a PDF</div>
    </div>
    <input type="file" id="fileInput" accept="application/pdf" hidden>
    <div id="fileInfo" style="font-size:0.8rem; margin:0.5rem 0;"></div>
    <input type="text" id="watermarkText" placeholder="Watermark text" value="CONFIDENTIAL">
    <select id="watermarkOpacity">
      <option value="0.3">Light</option>
      <option value="0.5" selected>Medium</option>
      <option value="0.7">Dark</option>
    </select>
    <button id="watermarkBtn" class="btn-primary">Add Watermark</button>
    <div style="text-align: center; margin-top: 1rem;">
      <a href="/" class="back-link"><i class="fas fa-arrow-left"></i> Back to All Tools</a>
    </div>
  </div>
  <footer>⚡ All processing happens locally – your files never leave your device.</footer>
</div>
<script>
  function showToast(msg, isErr = false) {
    let t = document.querySelector('.toast'); if(t) t.remove();
    let div = document.createElement('div'); div.className = 'toast';
    div.innerHTML = `<i class="fas ${isErr ? 'fa-exclamation-triangle' : 'fa-check-circle'}"></i> ${msg}`;
    div.style.background = isErr ? '#b91c1cdd' : '#1f3b4cdd';
    document.body.appendChild(div);
    setTimeout(() => div.remove(), 3000);
  }
  function formatBytes(b) { if(b===0) return '0 Bytes'; const k=1024; const i=Math.floor(Math.log(b)/Math.log(k)); return parseFloat((b/Math.pow(k,i)).toFixed(1))+' '+['Bytes','KB','MB'][i]; }
  function escapeHtml(str) { return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]); }
  async function loadPdf(file) { return await PDFLib.PDFDocument.load(await file.arrayBuffer()); }
  async function saveAndDownload(pdfDoc, filename) { saveAs(new Blob([await pdfDoc.save()], {type:'application/pdf'}), filename); }

  let watermarkFile = null;
  const dropZone = document.getElementById('dropZone');
  const fileInput = document.getElementById('fileInput');
  const fileInfo = document.getElementById('fileInfo');
  const watermarkBtn = document.getElementById('watermarkBtn');
  const watermarkText = document.getElementById('watermarkText');
  const watermarkOpacity = document.getElementById('watermarkOpacity');

  function setFile(file) {
    watermarkFile = file;
    fileInfo.innerHTML = file ? `<i class="fas fa-file-pdf"></i> ${escapeHtml(file.name)} (${formatBytes(file.size)})` : '';
  }

  function handleDrop(files) {
    let f = Array.from(files).find(f => f.type === 'application/pdf');
    if(f) { setFile(f); showToast(`Watermark ready: ${f.name}`); }
    else showToast('PDF required', true);
  }

  dropZone.addEventListener('click', () => fileInput.click());
  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('drag-over');
    handleDrop(e.dataTransfer.files);
  });
  fileInput.addEventListener('change', e => {
    handleDrop(e.target.files);
    fileInput.value = '';
  });

  watermarkBtn.addEventListener('click', async () => {
    if(!watermarkFile) { showToast('Select a PDF', true); return; }
    watermarkBtn.disabled = true;
    const orig = watermarkBtn.innerHTML;
    watermarkBtn.innerHTML = '<span class="spinner"></span> Adding watermark...';
    try {
      const doc = await loadPdf(watermarkFile);
      const text = watermarkText.value || 'CONFIDENTIAL';
      const opacity = parseFloat(watermarkOpacity.value);
      const pages = doc.getPages();
      for(let page of pages) {
        const { width, height } = page.getSize();
        const fontSize = Math.min(width, height) / 10;
        page.drawText(text, {
          x: width/2, y: height/2,
          size: fontSize,
          opacity: opacity,
          color: PDFLib.rgb(0.7,0.7,0.7),
          rotate: PDFLib.degrees(45)
        });
      }
      await saveAndDownload(doc, `watermarked_${watermarkFile.name}`);
      showToast(`✅ Watermark added`);
    } catch(e) {
      showToast('Watermark error: ' + e.message, true);
    } finally {
      watermarkBtn.disabled = false;
      watermarkBtn.innerHTML = orig;
    }
  });
</script>
</body>
</html>
