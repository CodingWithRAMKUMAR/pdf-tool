<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Optimize PDF – Convertulo</title>
  <style>/* same CSS block */</style>
</head>
<body>
<div class="container">
  <div class="card">
    <div class="card-header"><i class="fas fa-rocket"></i><h1>Optimize PDF</h1></div>
    <div class="drop-zone" id="dropZone"><div class="drop-icon"><i class="fas fa-file-pdf"></i></div><div class="drop-text">Drop PDF</div></div>
    <input type="file" id="fileInput" accept="application/pdf" hidden>
    <div id="fileInfo"></div>
    <button id="optimizeBtn" class="btn-primary">Optimize & Download</button>
    <div style="text-align: center;"><a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to all tools</a></div>
  </div>
</div>
<script>
  let optFile = null;
  const dropZone = document.getElementById('dropZone'), fileInput = document.getElementById('fileInput'), fileInfo = document.getElementById('fileInfo'), optimizeBtn = document.getElementById('optimizeBtn');
  function setFile(file) { optFile = file; fileInfo.innerHTML = file ? `<i class="fas fa-file-pdf"></i> ${escapeHtml(file.name)} (${formatBytes(file.size)})` : ''; }
  function handleDrop(files) { let f = Array.from(files).find(f => f.type === 'application/pdf'); if(f) { setFile(f); showToast(`Ready to optimize`); } else showToast('PDF required', true); }
  dropZone.addEventListener('click', () => fileInput.click());
  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
  dropZone.addEventListener('drop', e => { e.preventDefault(); dropZone.classList.remove('drag-over'); handleDrop(e.dataTransfer.files); });
  fileInput.addEventListener('change', e => { handleDrop(e.target.files); fileInput.value = ''; });
  optimizeBtn.addEventListener('click', async () => {
    if(!optFile) { showToast('Select a PDF', true); return; }
    optimizeBtn.disabled = true; const orig = optimizeBtn.innerHTML; optimizeBtn.innerHTML = '<span class="spinner"></span> Optimizing...';
    try {
      const doc = await loadPdf(optFile);
      const optimizedBytes = await doc.save({ useObjectStreams: true, addDefaultPage: false });
      saveAs(new Blob([optimizedBytes], { type: 'application/pdf' }), `optimized_${optFile.name}`);
      showToast(`✅ PDF optimized`);
    } catch(e) { showToast('Optimize error: ' + e.message, true); }
    finally { optimizeBtn.disabled = false; optimizeBtn.innerHTML = orig; }
  });
</script>
</body>
</html>
